# Talhelper config for the home cluster
#
# Renders machine configs into ./clusterconfig/ (gitignored) from this
# declarative spec + the encrypted talsecret.sops.yaml.
#
# Day-2 workflow:
#   talhelper genconfig                              # render configs
#   talhelper gencommand apply --extra-flags --dry-run | bash   # preview
#   talhelper gencommand apply | bash                # apply to live cluster
#   talhelper gencommand upgrade | bash              # OS upgrade
#
# Bootstrap from scratch (new cluster):
#   talhelper gensecret > talsecret.yaml
#   sops -e -i talsecret.yaml && mv talsecret.yaml talsecret.sops.yaml
#   talhelper genconfig
#   talhelper gencommand apply --extra-flags --insecure | bash   # first apply
#   talhelper gencommand bootstrap | bash
#   talhelper gencommand kubeconfig | bash
---
clusterName: home
talosVersion: v1.13.6
kubernetesVersion: v1.36.2
endpoint: https://10.0.0.30:6443

# Talos Image Factory schematic — installer image with NVIDIA extensions
# (siderolabs/nvidia-open-gpu-kernel-modules-lts,
# siderolabs/nvidia-container-toolkit-lts — the "-production" suffix
# is now required; the old bare names still resolve via Image Factory's
# schematic endpoint but newer talhelper releases validate against the
# current extension catalog, which only lists the suffixed forms. See
# issue tracking the talhelper validation gap.
# "-production" (vs "-lts") tracks the newest NVIDIA driver releases, needed
# for Blackwell (SM120) support.
# Regenerate at https://factory.talos.dev if the extension set changes; the ID
# is content-addressable so any change produces a new ID.
# (imageFactory block omitted — talhelper's registryURL/protocol/schematicEndpoint
# defaults already resolve to factory.talos.dev over https, which is what we want.
# An older single-field "schematicEndpoint: https://factory.talos.dev" override
# here broke URL construction on talhelper 3.1.12's newer imageFactory schema.)

nodes:
  - hostname: talos-210-73x
    ipAddress: 10.0.0.177
    controlPlane: true
    installDiskSelector:
      busPath: /dev/sda
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/nvidia-open-gpu-kernel-modules-lts
            - siderolabs/nvidia-container-toolkit-lts
    # Per-node patches
    patches:
      - "@./patches/local-storage.yaml"
      - "@./patches/nvidia-module-options.yaml"
      - "@./patches/hdd-storage.yaml"
