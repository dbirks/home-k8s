# Time-slicing config: the single RTX PRO 6000 Blackwell doesn't support MIG
# (workstation SKU), so we replicate nvidia.com/gpu into 2 schedulable slots
# to let vllm-qwen27 and autoresearch share the physical card. This is
# compute time-slicing only — no memory isolation between processes, so
# each workload's own memory ceiling (e.g. vllm's --gpu-memory-utilization)
# must be sized to leave room for the other. See apps/autoresearch.yaml and
# apps/vllm.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nvidia-device-plugin-configs
  namespace: kube-system
data:
  time-slicing-config: |-
    version: v1
    flags:
      migStrategy: none
    sharing:
      timeSlicing:
        resources:
        - name: nvidia.com/gpu
          replicas: 2
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-device-plugin
  namespace: kube-system
spec:
  interval: 5m
  chart:
    spec:
      chart: nvidia-device-plugin
      # Current version found here:
      # https://github.com/NVIDIA/k8s-device-plugin/blob/main/deployments/helm/nvidia-device-plugin/Chart.yaml#L5
      # PINNED to 0.17.1: 0.19.3 (2026-07-20 attempt) failed NVML init on this
      # node -- "init result=11" (NVML_ERROR_FUNCTION_NOT_FOUND) -> advertised 0
      # GPUs (allocatable dropped 2->0). The newer plugin's bundled NVML expects
      # a newer driver than 580.167.08. Upgrade the plugin ONLY alongside a driver
      # bump. 0.17.1 detects the Blackwell card fine (no arch label, but works).
      version: "0.17.1"
      sourceRef:
        kind: HelmRepository
        name: nvdp
        namespace: flux-system
      interval: 5m
  # Default values:
  # https://github.com/NVIDIA/k8s-device-plugin/blob/main/deployments/helm/nvidia-device-plugin/values.yaml
  values:
    runtimeClassName: nvidia
    config:
      name: nvidia-device-plugin-configs
      default: time-slicing-config
