apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: tailscale-operator
      # Current version found here:
      # https://pkgs.tailscale.com/helmcharts/index.yaml
      #
      # Bumped 1.96.5 -> 1.98.4: the 1.96.5 image (docker.io/tailscale/k8s-operator)
      # was corrupted in the node's local image cache from the same event that
      # corrupted pihole/ingress-nginx around 2026-07-10 22:30 (exact same cached
      # timestamp: 2026-07-10T05:56:13Z). Exec into the pod failed with
      # "exec format error" on a completely fresh (0-restart) pod, even with
      # imagePullPolicy: Always -- because the registry still resolves v1.96.5 to
      # the SAME digest already cached locally, so Always sees a digest match and
      # reuses the corrupted local content instead of re-downloading. Bumping to
      # a genuinely different, not-yet-cached version forces a real fresh pull.
      version: 1.98.4
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: flux-system
      interval: 5m
  # Default values:
  # https://github.com/tailscale/tailscale/blob/main/cmd/k8s-operator/deploy/chart/values.yaml
  # Reads from a secret called operator-oauth
  # values:
