apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: kube-system
spec:
  interval: 5m
  chart:
    spec:
      chart: external-dns
      # https://github.com/kubernetes-sigs/external-dns/blob/master/charts/external-dns/Chart.yaml
      # Bumped 1.20.0 -> 1.21.1 (image v0.20.0 -> v0.21.0) to force a fresh image pull:
      # the locally-cached v0.20.0 image on the node was corrupted (post power-outage
      # containerd content-store corruption -- container exec'd with "exec format error"),
      # and re-pulling the same tag/digest just reuses the corrupted local blob.
      version: 1.21.1
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
      interval: 5m
  # Default values:
  # https://github.com/kubernetes-sigs/external-dns/blob/master/charts/external-dns/values.yaml
  values:
    sources:
      - ingress
    # Pi-hole only supports A/CNAME records, no TXT for ownership tracking
    registry: noop
    provider:
      name: pihole
    env:
      - name: EXTERNAL_DNS_PIHOLE_SERVER
        value: http://pihole-web.default
      - name: EXTERNAL_DNS_PIHOLE_PASSWORD
        value: admin

    extraArgs:
      # Pi-hole v6 API support (merged upstream, v5 is deprecated)
      - "--pihole-api-version=6"
      # Only watch private-class ingresses (10.0.0.200)
      - "--ingress-class=private"
      # Belt-and-suspenders pin: all *.hoam.lan records always resolve to
      # the private controller's IP, regardless of what's in each Ingress's
      # status.loadBalancer.ingress. This was tried before as "--target"
      # (13598ac) and reverted (d7ca776) because that flag didn't exist in
      # external-dns v0.20.0. It exists now as --default-targets in v0.21.0.
      # Root cause of the flapping is fixed properly in ingress-nginx-private/
      # public.yaml (unique controllerValue so the two controllers stop
      # racing to overwrite each other's Ingress status), but this stays on
      # as a safety net in case any future ingress-nginx release regresses
      # the controllerValue setting.
      - "--default-targets=10.0.0.200"
