apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: kube-system
spec:
  interval: 5m
  chart:
    spec:
      chart: external-dns
      # https://github.com/kubernetes-sigs/external-dns/blob/master/charts/external-dns/Chart.yaml
      version: 1.20.0
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
      interval: 5m
  # Default values:
  # https://github.com/kubernetes-sigs/external-dns/blob/master/charts/external-dns/values.yaml
  values:
    sources:
      - ingress
    # Pi-hole only supports A/CNAME records, no TXT for ownership tracking
    registry: noop
    provider:
      name: pihole
    env:
      - name: EXTERNAL_DNS_PIHOLE_SERVER
        value: http://pihole-web.default
      - name: EXTERNAL_DNS_PIHOLE_PASSWORD
        value: admin

    extraArgs:
      # Pi-hole v6 API support (merged upstream, v5 is deprecated)
      - "--pihole-api-version=6"
      # Only watch private-class ingresses (10.0.0.200)
      - "--ingress-class=private"
      # Force all records to 10.0.0.200 regardless of ingress status —
      # both nginx controllers race to write their IP into ingress status;
      # this bypasses that conflict until the electionID fix takes hold
      - "--target=10.0.0.200"
