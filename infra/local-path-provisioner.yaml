---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: local-path-provisioner
  namespace: flux-system
spec:
  interval: 1h
  url: https://github.com/rancher/local-path-provisioner
  ref:
    tag: v0.0.31
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: local-path-provisioner
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: local-path-provisioner
  path: ./deploy
  prune: true
  wait: true
  timeout: 5m
  patches:
    # Configure storage path for Talos (filesystem is immutable, must use /var)
    - patch: |-
        kind: ConfigMap
        apiVersion: v1
        metadata:
          name: local-path-config
          namespace: local-path-storage
        data:
          config.json: |-
            {
              "nodePathMap":[
                {
                  "node":"DEFAULT_PATH_FOR_NON_LISTED_NODES",
                  "paths":["/var/lib/local-path-provisioner"]
                }
              ]
            }
    # Make it the default StorageClass
    - patch: |-
        apiVersion: storage.k8s.io/v1
        kind: StorageClass
        metadata:
          name: local-path
          annotations:
            storageclass.kubernetes.io/is-default-class: "true"
    # Required: privileged namespace for node access
    - patch: |-
        apiVersion: v1
        kind: Namespace
        metadata:
          name: local-path-storage
          labels:
            pod-security.kubernetes.io/enforce: privileged
