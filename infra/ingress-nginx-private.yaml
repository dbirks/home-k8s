apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx-private
  namespace: kube-system
spec:
  interval: 5m
  chart:
    spec:
      chart: ingress-nginx
      # Current version found here:
      # https://github.com/kubernetes/ingress-nginx/blob/main/charts/ingress-nginx/Chart.yaml#L23
      version: 4.12.1
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
      interval: 1m
  # Default values:
  # https://github.com/kubernetes/ingress-nginx/blob/main/charts/ingress-nginx/values.yaml
  values:
    controller:
      image:
        # All 4 replicas across both private+public controllers have been
        # crash-looping for 2+ days: "Error relocating /usr/bin/nginx: ...
        # symbol not found" -- the node's locally cached image for the
        # chart-pinned digest (v1.12.1@sha256:d2fbc4ec...) is broken. v1.12.x
        # is EOL upstream (no patch releases beyond v1.12.1), so bumping to a
        # newer minor (v1.14.4) with digest cleared forces a genuinely fresh
        # pull under a reference the node has never cached, sidestepping
        # whatever corrupted the old cached layer.
        tag: "v1.14.4"
        digest: ""
        pullPolicy: Always
      electionID: ingress-controller-leader-private
      ingressClassResource:
        name: private
        default: false
      ingressClass: private
      service:
        annotations:
          metallb.universe.tf/loadBalancerIPs: 10.0.0.200
