apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx-private
  namespace: kube-system
spec:
  interval: 5m
  chart:
    spec:
      chart: ingress-nginx
      # Current version found here:
      # https://github.com/kubernetes/ingress-nginx/blob/main/charts/ingress-nginx/Chart.yaml#L23
      version: 4.15.1
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
      interval: 1m
  # Default values:
  # https://github.com/kubernetes/ingress-nginx/blob/main/charts/ingress-nginx/values.yaml
  values:
    controller:
      image:
        # All 4 replicas across both private+public controllers have been
        # crash-looping for 2+ days: "Error relocating /usr/bin/nginx: ...
        # symbol not found" -- the node's locally cached image for the
        # chart-pinned digest (v1.12.1@sha256:d2fbc4ec...) is broken. v1.12.x
        # is EOL upstream (no patch releases beyond v1.12.1), so bumping to a
        # newer minor (v1.14.4) with digest cleared forces a genuinely fresh
        # pull under a reference the node has never cached, sidestepping
        # whatever corrupted the old cached layer.
        tag: "v1.14.4"
        digest: ""
        pullPolicy: Always
      electionID: ingress-controller-leader-private
      ingressClassResource:
        name: private
        default: false
        # Root cause of the *.hoam.lan DNS flapping (2026-07-15): both the
        # private and public releases left this at the chart default
        # (k8s.io/ingress-nginx), so BOTH controller Deployments matched
        # BOTH IngressClasses (matching is by this controller value, not by
        # IngressClass *name*) and raced to overwrite status.loadBalancer.ingress
        # on every Ingress with their own IP every ~1m resync. The unique
        # electionID (added in 13598ac) only fixed leader election *within*
        # one release's replicas -- it never stopped the two separate
        # releases from both reconciling every Ingress. Giving each release
        # its own controllerValue (which becomes --controller-class) makes
        # this controller ignore Ingresses/IngressClasses it doesn't own.
        controllerValue: k8s.io/ingress-nginx-private
      ingressClass: private
      service:
        annotations:
          metallb.universe.tf/loadBalancerIPs: 10.0.0.200
