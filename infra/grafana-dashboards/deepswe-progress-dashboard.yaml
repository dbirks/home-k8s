# DeepSWE trajectory-generation progress dashboard.
# Metrics served by the controller pod (apps/dspark-deepswe-controller-*.yaml),
# scraped by the Prometheus 'dspark-deepswe' job. Datasource uid: prometheus.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: deepswe-progress-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  deepswe-progress.json: |
    {
      "annotations": {"list": [{"builtIn": 1, "datasource": {"type": "grafana", "uid": "-- Grafana --"}, "enable": true, "hide": true, "name": "Annotations & Alerts", "type": "dashboard"}]},
      "description": "DeepSWE trajectory generation progress + retry health",
      "editable": true,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}, {"color": "green", "value": 90}]}}, "overrides": []},
          "gridPos": {"h": 6, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "showThresholdLabels": false, "showThresholdMarkers": true},
          "title": "% Complete",
          "type": "gauge",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "100 * deepswe_tasks_done / deepswe_tasks_total", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "fixed", "fixedColor": "green"}}, "overrides": []},
          "gridPos": {"h": 6, "w": 4, "x": 6, "y": 0},
          "id": 2,
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value", "graphMode": "area"},
          "title": "Done",
          "type": "stat",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "deepswe_tasks_done", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "fixed", "fixedColor": "orange"}}, "overrides": []},
          "gridPos": {"h": 6, "w": 4, "x": 10, "y": 0},
          "id": 3,
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value"},
          "title": "Pending",
          "type": "stat",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "deepswe_tasks_pending", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "fixed", "fixedColor": "blue"}}, "overrides": []},
          "gridPos": {"h": 6, "w": 4, "x": 14, "y": 0},
          "id": 4,
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value"},
          "title": "In Flight",
          "type": "stat",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "deepswe_tasks_in_flight", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "h", "decimals": 1, "color": {"mode": "fixed", "fixedColor": "purple"}}, "overrides": []},
          "gridPos": {"h": 6, "w": 6, "x": 18, "y": 0},
          "id": 5,
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value"},
          "title": "ETA (hours, 1h rate)",
          "type": "stat",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "deepswe_tasks_pending / (rate(deepswe_tasks_succeeded_total[1h]) * 3600)", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"drawStyle": "line", "fillOpacity": 10, "stacking": {"mode": "none"}}}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 6},
          "id": 6,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "calcs": []}, "tooltip": {"mode": "multi"}},
          "title": "Progress over time",
          "type": "timeseries",
          "targets": [
            {"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "deepswe_tasks_done", "legendFormat": "done", "refId": "A"},
            {"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "deepswe_tasks_pending", "legendFormat": "pending", "refId": "B"},
            {"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "deepswe_tasks_in_flight", "legendFormat": "in flight", "refId": "C"}
          ]
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"drawStyle": "line", "fillOpacity": 10}}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 6},
          "id": 7,
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "title": "Completion rate (tasks/hour)",
          "type": "timeseries",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "rate(deepswe_tasks_succeeded_total[1h]) * 3600", "legendFormat": "succeeded/hr", "refId": "A"}]
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"drawStyle": "line", "fillOpacity": 10}}, "overrides": [{"matcher": {"id": "byName", "options": "failed/min"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "red"}}]}, {"matcher": {"id": "byName", "options": "retried/min"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "yellow"}}]}]},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 14},
          "id": 8,
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "title": "Outcomes /min (retries = failures being re-queued, not lost)",
          "type": "timeseries",
          "targets": [
            {"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "rate(deepswe_tasks_succeeded_total[5m]) * 60", "legendFormat": "succeeded/min", "refId": "A"},
            {"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "rate(deepswe_tasks_retried_total[5m]) * 60", "legendFormat": "retried/min", "refId": "B"},
            {"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "rate(deepswe_tasks_failed_total[5m]) * 60", "legendFormat": "failed/min", "refId": "C"}
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["dspark", "deepswe"],
      "templating": {"list": []},
      "time": {"from": "now-24h", "to": "now"},
      "title": "DeepSWE Generation Progress",
      "uid": "deepswe-progress"
    }
