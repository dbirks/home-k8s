# Loki - log storage and query backend
# Chart values: https://github.com/grafana/loki/tree/main/production/helm/loki
# Deployed in SingleBinary monolithic mode with filesystem storage for a lean homelab.
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: loki
      version: "7.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 5m
  values:
    # Run as a single binary (monolithic) - all components in one pod
    deploymentMode: SingleBinary

    loki:
      # Homelab - no multi-tenancy needed
      auth_enabled: false

      # Required: must be set to something even for filesystem storage
      commonConfig:
        replication_factor: 1
        path_prefix: /var/loki

      # Filesystem storage (no S3/MinIO)
      storage:
        type: filesystem
        filesystem:
          chunks_directory: /var/loki/chunks
          rules_directory: /var/loki/rules

      # TSDB schema (latest, replaces boltdb-shipper)
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h

      # 30 day retention
      limits_config:
        retention_period: 720h
        reject_old_samples: true
        reject_old_samples_max_age: 168h
        max_cache_freshness_per_query: 10m
        split_queries_by_interval: 15m
        volume_enabled: true

      compactor:
        retention_enabled: true
        delete_request_store: filesystem

      # Loki server listens on 3100
      server:
        http_listen_port: 3100
        grpc_listen_port: 9095

      # Disable embedded ruler/query-scheduler features not needed
      pattern_ingester:
        enabled: false

    # Single-binary configuration
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        size: 20Gi
        storageClass: local-path
        accessModes:
          - ReadWriteOnce

    # Disable scalable / microservices components
    write:
      replicas: 0
    read:
      replicas: 0
    backend:
      replicas: 0

    # Disable bundled extras we don't need
    minio:
      enabled: false
    gateway:
      enabled: false
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    lokiCanary:
      enabled: false
    test:
      enabled: false

    # Plain ClusterIP service on 3100 - Grafana queries via cluster DNS
    service:
      type: ClusterIP
