apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx-public
  namespace: kube-system
spec:
  interval: 5m
  chart:
    spec:
      chart: ingress-nginx
      # Current version found here:
      # https://github.com/kubernetes/ingress-nginx/blob/main/charts/ingress-nginx/Chart.yaml#L23
      version: 4.12.1
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
      interval: 1m
  # Default values:
  # https://github.com/kubernetes/ingress-nginx/blob/main/charts/ingress-nginx/values.yaml
  values:
    controller:
      image:
        # See ingress-nginx-private.yaml for the full explanation -- same
        # crash-looping bug, same fix (fresh pull under an uncached tag).
        tag: "v1.14.4"
        digest: ""
        pullPolicy: Always
      electionID: ingress-controller-leader-public
      ingressClassResource:
        name: public
        default: false
        # See ingress-nginx-private.yaml -- unique controllerValue so this
        # controller only reconciles the "public" IngressClass, not "private"
        # too (chart default k8s.io/ingress-nginx was shared by both
        # releases, causing both to race on every Ingress's LB status).
        controllerValue: k8s.io/ingress-nginx-public
      ingressClass: public
      service:
        annotations:
          metallb.universe.tf/loadBalancerIPs: 10.0.0.201
