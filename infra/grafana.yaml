# Grafana - dashboards and visualization
# Chart values: https://github.com/grafana/helm-charts/tree/main/charts/grafana
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 5m
  chart:
    spec:
      chart: grafana
      version: "10.5.15"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 5m
  values:
    adminUser: admin
    adminPassword: admin

    service:
      type: ClusterIP
      port: 80

    persistence:
      enabled: true
      type: pvc
      size: 5Gi
      storageClassName: local-path
      accessModes:
        - ReadWriteOnce

    ingress:
      enabled: true
      ingressClassName: private
      hosts:
        - grafana.hoam.lan

    # Sidecar watches for ConfigMaps with dashboard/datasource labels
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL
      datasources:
        enabled: true
        label: grafana_datasource
        labelValue: "1"
        searchNamespace: ALL

    # Provision Prometheus as default datasource
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            uid: prometheus
            url: http://prometheus-server.monitoring.svc.cluster.local
            access: proxy
            isDefault: true
            editable: true
