apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptime-kuma
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: uptime-kuma
      # Current version found here:
      # https://github.com/dirsigler/uptime-kuma-helm/blob/main/charts/uptime-kuma/Chart.yaml#L14
      version: 2.21.2
      sourceRef:
        kind: HelmRepository
        name: uptime-kuma
        namespace: flux-system
      interval: 5m
  # Default values:
  # https://github.com/dirsigler/uptime-kuma-helm/blob/main/charts/uptime-kuma/values.yaml
  values:
    image:
      # 2.0.0-beta.1's locally-cached image was corrupted (post power-outage containerd
      # content-store corruption -- "/usr/bin/dumb-init: error while loading shared
      # libraries: /lib/x86_64-linux-gnu/libc.so.6: file too short", i.e. a literally
      # truncated file on disk in the shared Debian base layer).
      # NOTE: beta.2 did NOT fix this -- its base OS layer is byte-identical (same
      # digest: sha256:a480a496...) to beta.1's, so containerd reused the same
      # corrupted local blob instead of re-downloading it, and the pod kept crashing
      # with the exact same libc error even after the tag bump.
      # beta.3 was rebuilt on an updated base image (confirmed different base-layer
      # digest: sha256:61320b01...), so it's pinned here instead to force a genuinely
      # fresh, uncorrupted pull of every layer including the base OS one.
      tag: 2.0.0-beta.3
    ingress:
      enabled: true
      className: private
      hosts:
        - host: uptime.hoam.lan
          paths:
            - path: /
              pathType: Prefix
    volume:
      enabled: true
      size: 5Gi
      storageClassName: local-path
