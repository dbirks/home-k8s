# =====================================================================
# llama.cpp Server - Qwen3-Coder-30B-A3B-Instruct (GGUF Q8_0)
# =====================================================================
# Architecture: MoE (30B total, 3B active per token)
# Strategy: GPU handles attention + shared layers, CPU handles MoE experts
# VRAM: ~10-12GB (non-expert weights) + KV cache on RTX 5090
# CPU RAM: ~20-25GB for expert weights
# Anthropic /v1/messages API: built-in, no flag needed
# KV cache: q8_0 keys + q4_0 values = ~3x compression
#
# Claude Code connection:
#   ANTHROPIC_BASE_URL=http://llama.hoam.lan
#   ANTHROPIC_API_KEY=dummy
#   ANTHROPIC_AUTH_TOKEN=dummy
#   ANTHROPIC_DEFAULT_OPUS_MODEL=main
#   ANTHROPIC_DEFAULT_SONNET_MODEL=main
#   ANTHROPIC_DEFAULT_HAIKU_MODEL=main
#   claude
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llama-models
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      # Q8_0 GGUF is ~30GB, plus cache overhead
      storage: 100Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama
  namespace: default
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: llama
  template:
    metadata:
      labels:
        app: llama
    spec:
      runtimeClassName: nvidia
      containers:
        - name: llama-server
          image: ghcr.io/ggml-org/llama.cpp:server-cuda
          args:
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
            # Model: Q4_K_M fits entirely on GPU (~17GB), no CPU offload needed
            # This lets the 5090 do ALL the compute - expect 150-234 tok/s
            - "--hf-repo"
            - "unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF:Q4_K_M"
            # GPU: all layers on GPU (no expert offloading)
            - "-ngl"
            - "99"
            # KV cache quantization: q8_0 keys + q4_0 values
            # ~3x compression vs f16, maximizes context length
            - "--cache-type-k"
            - "q8_0"
            - "--cache-type-v"
            - "q4_0"
            # Flash attention for efficient long-context
            - "-fa"
            - "on"
            # Context: ~15GB free VRAM for KV cache with q8/q4 compression
            # should support 64K+ context
            - "-c"
            - "65536"
            # Concurrent request slots
            - "-np"
            - "2"
            # Model alias for Claude Code (no slashes allowed)
            - "-a"
            - "main"
          ports:
            - containerPort: 8080
          resources:
            limits:
              nvidia.com/gpu: 1
            requests:
              cpu: "1"
              # Model fully on GPU, minimal CPU RAM needed
              memory: 4Gi
          volumeMounts:
            # Mount at /root/.cache so both huggingface and llama.cpp caches persist
            - name: models
              mountPath: /root/.cache
          # Model download can take a long time on first start
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 120
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: llama-models
---
apiVersion: v1
kind: Service
metadata:
  name: llama
  namespace: default
spec:
  selector:
    app: llama
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llama
  namespace: default
spec:
  ingressClassName: private
  rules:
    - host: llama.hoam.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: llama
                port:
                  number: 80
