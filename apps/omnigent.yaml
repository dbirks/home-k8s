# Omnigent — coding agent orchestration server
#
# On-demand Kubernetes sandbox is enabled — the server spawns ephemeral runner
# Pods in the `omnigent-sandboxes` namespace (see omnigent-sandbox.yaml for the
# RBAC and config). Uses the official omnigent-server-kubernetes image, which
# ships the sandbox provider SDK pre-bundled (as of v0.5.0) -- no more
# pip-installing `omnigent[kubernetes]` at container startup.
#
# Auth is disabled (single-user / home-lab mode). The private nginx ingress and
# Tailscale subnet router act as the security perimeter. accounts mode is
# incompatible with the sandbox runner dial-back token model.
#
# Endpoint: omnigent.hoam.lan (private ingress)
# Storage: local-path PVC (omnigent-data for server, postgres-data for DB)
---
apiVersion: v1
kind: Namespace
metadata:
  name: omnigent
---
# PVC for /data — persists artifacts, admin-credentials, and config
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: omnigent-data
  namespace: omnigent
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
# In-cluster Postgres
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: omnigent
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: omnigent-postgres
  template:
    metadata:
      labels:
        app: omnigent-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: omnigent
            - name: POSTGRES_USER
              value: omnigent
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: omnigent-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "omnigent"]
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "omnigent"]
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: omnigent
spec:
  type: ClusterIP
  selector:
    app: omnigent-postgres
  ports:
    - port: 5432
      targetPort: postgres
      name: postgres
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: omnigent-config
  namespace: omnigent
data:
  HOST: "0.0.0.0"
  PORT: "8000"
  ARTIFACT_DIR: "/data/artifacts"
  # Keep admin-credentials on the PVC so they survive restarts
  OMNIGENT_ADMIN_CREDENTIALS_PATH: "/data/admin-credentials"
  # Auth disabled — accounts mode is incompatible with sandbox runner dial-back
  # (runner token doesn't carry user identity → 403 on every tunnel attempt).
  # Private ingress + Tailscale is the security boundary.
  OMNIGENT_AUTH_ENABLED: "0"
  # When AUTH_ENABLED=0 the entrypoint sets LOCAL_SINGLE_USER=1, which only
  # allows loopback WS origins. Explicitly allowlist the ingress hostname so
  # the browser UI can connect.
  OMNIGENT_WS_ALLOWED_ORIGINS: "http://omnigent.hoam.lan"
  # Sandbox provider config file — kubernetes runner Pods
  OMNIGENT_CONFIG: "/etc/omnigent/config.yaml"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnigent
  namespace: omnigent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: omnigent
  template:
    metadata:
      labels:
        app: omnigent
    spec:
      # Server SA has cross-namespace pod-create rights in omnigent-sandboxes
      serviceAccountName: omnigent-server
      containers:
        - name: omnigent
          # v0.5.1, official Kubernetes image (sandbox provider SDK pre-bundled)
          image: ghcr.io/omnigent-ai/omnigent-server-kubernetes:v0.5.1
          imagePullPolicy: Always
          command:
            - python
            - /app/entrypoint.py
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: omnigent-config
            - secretRef:
                name: omnigent-secrets
          volumeMounts:
            # Mount at /data (not /data/artifacts) to match docker-compose —
            # admin-credentials lives at /data/admin-credentials, outside artifacts/
            - name: data
              mountPath: /data
            # Sandbox provider config read by OMNIGENT_CONFIG env var
            - name: sandbox-config
              mountPath: /etc/omnigent
              readOnly: true
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: 2000m
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: omnigent-data
        - name: sandbox-config
          configMap:
            name: omnigent-sandbox-config
---
apiVersion: v1
kind: Service
metadata:
  name: omnigent
  namespace: omnigent
spec:
  type: ClusterIP
  selector:
    app: omnigent
  ports:
    - port: 80
      targetPort: http
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omnigent
  namespace: omnigent
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: private
  rules:
    - host: omnigent.hoam.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: omnigent
                port:
                  name: http
