# IntelligentRoute CR for the vLLM semantic router.
#
# The router reconciler requires both IntelligentPool AND IntelligentRoute
# to exist before it opens the HTTP/gRPC API for traffic. Neither is
# created by the Helm chart.
#
# This is a catch-all route: any request matching the "general" domain
# (which is the catch-all MMLU category) goes to the main model.
# Add more specific decisions with higher priority to route subsets
# to qwen4b when it's enabled.
---
apiVersion: vllm.ai/v1alpha1
kind: IntelligentRoute
metadata:
  name: vllm-route
  namespace: default
spec:
  signals:
    domains:
      - name: "other"
        description: "Catch-all MMLU domain (all requests not matching a specific category)"
  decisions:
    - name: "default-to-large"
      description: "Route all requests to Qwen3.6-27B (27B). Add higher-priority decisions to divert simple queries to qwen4b."
      priority: 100
      signals:
        operator: "OR"
        conditions:
          - name: "other"
            type: "domain"
      modelRefs:
        - model: "main"
          useReasoning: true
          reasoningEffort: "high"
