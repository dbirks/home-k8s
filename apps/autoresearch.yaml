# autoresearch — nanochat-style small-GPT research loop
#
# The pod idles (sleep) by default; the coding agent drives experiments via
# `kubectl exec` per SETUP.md in the autoresearch-playground repo:
#   kubectl exec autoresearch-0 -- uv run prepare.py   # one-time data prep
#   kubectl exec autoresearch-0 -- uv run train.py     # each experiment
#
# Shares the single physical GPU with vllm-qwen27 via time-slicing (see
# prereqs/nvidia-device-plugin.yaml — this card has no MIG support). vllm's
# --gpu-memory-utilization was dropped to 0.50 to leave ~48GB free; the
# baseline training run here uses ~45GB.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: autoresearch-cache
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 100Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: autoresearch
  namespace: default
spec:
  serviceName: autoresearch
  replicas: 1
  selector:
    matchLabels:
      app: autoresearch
  template:
    metadata:
      labels:
        app: autoresearch
    spec:
      runtimeClassName: nvidia
      enableServiceLinks: false
      containers:
        - name: autoresearch
          image: ghcr.io/dbirks/autoresearch:master
          imagePullPolicy: Always
          command: ["sleep", "infinity"]
          env:
            - name: PYTORCH_ALLOC_CONF
              value: "expandable_segments:True"
          resources:
            limits:
              nvidia.com/gpu: 1
            requests:
              cpu: "2"
              memory: 8Gi
          volumeMounts:
            - name: cache
              mountPath: /root/.cache/autoresearch
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: autoresearch-cache
---
apiVersion: v1
kind: Service
metadata:
  name: autoresearch
  namespace: default
spec:
  clusterIP: None
  selector:
    app: autoresearch
