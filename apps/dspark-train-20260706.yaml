# DSpark Training Run — 2026-07-06
#
# Iteration 1: sharegpt 600 samples, 5 epochs, two-phase offline.
# Node has 32 GB RAM — vLLM + trainer can't coexist (OOM). Two-phase keeps
# GPU exclusive to each: Phase 1 = vLLM only, Phase 2 = trainer only.
# 600 samples × ~77 MB/file = ~46 GB fits within the 50 Gi dspark-output PVC.
#
# Fix 1 — CPU OOM: speculators loads embed_tokens+lm_head (~7 GB) into CPU RAM
# by default. On a 32 GB node this spikes RAM past the limit. Patched speculators
# source to load directly to CUDA (GPU-to-GPU copy, no CPU staging).
# Fix 2 — Triton SM120: DFlash backbone HEAD_DIM=256. sm12x lambda returns
# FlexBwDConfig(64,64,64,64) with assertion BLOCK_N1%BLOCK_M1==0 — no valid
# tile fits in SM120's 99 KB SMEM. Fix: force DFlash _attn_impl="eager" so
# the backbone uses create_float_mask+SDPA (CUDA kernels, no Triton SMEM).
# Fix 3 — eager SDPA OOM: Q_LEN = max_anchors×block_size. torch.compile bakes
# the first-observed value (1536×16=24576) into the compiled kernel. Post-install
# patch to dspark/core.py caps max_anchors=384 at Python level before tracing.
# Result: Q=6144, KV=8192, (20,6144,8192)×bf16=1.87 GB ← fits in 17 GB free.
# --max-anchors 384 in args has no practical effect (torch.compile specializes
# early), only the post-install hardcode works reliably.
# Job name is date-stamped so subsequent runs can coexist in git history.
#
# To run another iteration: copy this file, increment the date, adjust flags,
# delete the old completed job (kubectl delete job dspark-train-qwen27-20260706),
# then commit and push.
#
# Scale vLLM back up: set replicas: 1 in vllm.yaml + vllm-small.yaml, commit, push.
---
# Output PVC — shared across runs, checkpoints survive pod restarts
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dspark-output
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dspark-train-script-20260706
  namespace: default
data:
  train.sh: |
    #!/bin/bash
    # DSpark two-phase training:
    # Phase 1: vLLM generates + caches hidden states (no training, full GPU util)
    # Phase 2: trainer trains from cached files (no vLLM, low RAM)
    # Node has 32 GB RAM — vLLM + trainer can't coexist. Two-phase keeps
    # them exclusive: vLLM exits before trainer starts.
    #
    # Sample count capped at 600: 600 × ~77 MB = ~46 GB fits in the 50 Gi PVC.
    # We already have 439 cached from prior runs; only ~161 more needed.
    set -euo pipefail

    export HF_HOME=/data
    export CUDA_VISIBLE_DEVICES=0
    export PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True

    echo "=== [$(date)] DSpark training job started (run 20260706) ==="

    # ----------------------------------------------------------------
    # Step 0: Install git via apt, uv for fast package management,
    #         then clone speculators repo (gets package + scripts/ in one shot).
    # ----------------------------------------------------------------
    echo "=== [$(date -u)] Installing git ==="
    apt-get update -qq 2>&1 | tail -3
    apt-get install -y git --no-install-recommends -qq
    echo "  git: $(git --version)"

    echo "=== [$(date -u)] Installing uv ==="
    pip install uv --quiet --root-user-action ignore
    export PATH="/root/.local/bin:$PATH"
    hash -r
    export HF_HUB_ENABLE_HF_TRANSFER=1

    echo "=== [$(date -u)] Cloning speculators repo ==="
    if git clone --depth=1 https://github.com/vllm-project/speculators /tmp/speculators-repo 2>&1; then
        SPEC_SCRIPTS=/tmp/speculators-repo/scripts
        # Patch speculators: load verifier weights (embed_tokens+lm_head, ~7 GB) directly
        # to GPU instead of CPU RAM. Without this, 32 GB node OOMs during train.py init.
        # Move model to CUDA before load_verifier_weights so the copy is GPU-to-GPU.
        cat > /tmp/patch_speculators.py << 'PYPATCH'
    import re

    # Fix 1: Load verifier weights to GPU (avoid CPU RAM spike on 47 GB node)
    f = '/tmp/speculators-repo/src/speculators/utils/loading.py'
    c = open(f).read().replace('device="cpu"', 'device="cuda"')
    open(f, 'w').write(c)
    print('Patched loading.py: device=cpu -> cuda')
    for f2 in [
        '/tmp/speculators-repo/src/speculators/models/dflash/core.py',
        '/tmp/speculators-repo/src/speculators/models/dspark/core.py',
    ]:
        c = open(f2).read().replace(
            'model.load_verifier_weights()',
            'model.to("cuda"); model.load_verifier_weights()'
        )
        open(f2, 'w').write(c)
        print('Patched ' + f2 + ': model.cuda() before load_verifier_weights')

    # Fix 2: Force DFlash backbone to use eager attention (dense mask + SDPA).
    # SM120 (RTX PRO 6000) cannot compile flex_attention backward Triton kernel:
    # HEAD_DIM=256, BLOCK_N1 must be multiple of 64 (WGMMA + assert BLOCK_N1%BLOCK_M1==0),
    # min SMEM = 114688 bytes > SM120 optin limit of 101376 bytes. No valid tile.
    #
    # When _attn_implementation == "eager", DFlashDraftModel uses:
    #   - create_float_mask (dense bool -> additive mask) instead of create_block_mask
    #   - eager_attention_forward (transformers SDPA) instead of flex_attention_forward
    # Both are already implemented in speculators; we just need to force the mode.
    #
    # CRITICAL: from_training_args always sets _attn_implementation = "simple_flex_attention"
    # via kwargs.get("draft_attn_impl", ...), making the `if is None:` check in __init__
    # a no-op. We must patch the FULL block to UNCONDITIONALLY set "eager".
    core_file = '/tmp/speculators-repo/src/speculators/models/dflash/core.py'
    c = open(core_file).read()
    OLD_BLOCK = (
        '        if config.transformer_layer_config._attn_implementation is None:  # noqa: SLF001\n'
        '            config.transformer_layer_config._attn_implementation = (  # noqa: SLF001\n'
        '                "simple_flex_attention"\n'
        '            )\n'
        '        self._attn_impl = config.transformer_layer_config._attn_implementation  # noqa: SLF001\n'
    )
    NEW_BLOCK = (
        '        config.transformer_layer_config._attn_implementation = "eager"  # noqa: SLF001\n'
        '        self._attn_impl = "eager"\n'
    )
    if 'self._attn_impl = "eager"' in c:
        print('Already patched dflash/core.py (_attn_impl="eager"), skipping')
    elif OLD_BLOCK in c:
        c2 = c.replace(OLD_BLOCK, NEW_BLOCK)
        open(core_file, 'w').write(c2)
        remaining = c2.count('"simple_flex_attention"')
        print('Patched dflash/core.py: _attn_impl unconditionally set to eager (SDPA)')
        print('  Remaining simple_flex_attention refs (comparisons only):', remaining)
    else:
        print('ERROR: target block not found in dflash/core.py. Dumping _attn_implementation lines:')
        for i, line in enumerate(c.split('\n')):
            if '_attn_implementation' in line or 'simple_flex' in line:
                print('  line', i+1, ':', repr(line.rstrip()))
    PYPATCH
        python3 /tmp/patch_speculators.py
        uv pip install /tmp/speculators-repo hf_transfer --system --quiet
        # Fix 3: Post-install: cap max_anchors=384 in installed dspark/core.py.
        # Despite --max-anchors 384 in args, torch.compile specializes on the
        # FIRST observed value (often 1536 from a prior kwargs path) and bakes
        # that shape into the compiled kernel. Patching the installed file directly
        # ensures the cap is enforced at Python level before torch.compile traces.
        # 384*16=6144 Q_LEN → (20, 6144, 8192)×bf16 = 1.87 GB ← fits in 17 GB free.
        python3 << 'POSTINSTALL'
    dspark_inst = '/usr/local/lib/python3.12/dist-packages/speculators/models/dspark/core.py'
    c = open(dspark_inst).read()
    OLD = '        hidden, logits, targets, aligned_loss_mask, anchored_block_indices = (\n'
    NEW = '        max_anchors = min(max_anchors, 384)  # SM120 VRAM: 384*16=6144 Q, 1.87 GB attn\n        hidden, logits, targets, aligned_loss_mask, anchored_block_indices = (\n'
    if 'SM120 VRAM' in c:
        print('dspark/core.py already has SM120 VRAM cap, skipping')
    elif OLD in c:
        open(dspark_inst, 'w').write(c.replace(OLD, NEW, 1))
        import py_compile; py_compile.compile(dspark_inst)
        print('Patched installed dspark/core.py: capped max_anchors=384 for SM120')
    else:
        print('ERROR: could not find forward body target in installed dspark/core.py')
        for i, l in enumerate(c.split('\n')):
            if 'hidden, logits' in l or 'backbone_forward' in l or 'num_blocks' in l:
                print(f'  line {i+1}: {repr(l)}')
    POSTINSTALL
    else
        echo "  git clone failed — falling back to pip install + curl"
        uv pip install speculators hf_transfer --system --quiet
        SPEC_SCRIPTS=/tmp/speculators-scripts
        mkdir -p "$SPEC_SCRIPTS/evaluate"
        BASE="https://raw.githubusercontent.com/vllm-project/speculators/main/scripts"
        curl -fsSL "$BASE/prepare_data.py"            -o "$SPEC_SCRIPTS/prepare_data.py"
        curl -fsSL "$BASE/launch_vllm.py"             -o "$SPEC_SCRIPTS/launch_vllm.py"
        curl -fsSL "$BASE/data_generation_offline.py" -o "$SPEC_SCRIPTS/data_generation_offline.py"
        curl -fsSL "$BASE/train.py"                   -o "$SPEC_SCRIPTS/train.py"
        curl -fsSL "$BASE/evaluate/evaluate.py"       -o "$SPEC_SCRIPTS/evaluate/evaluate.py" || true
    fi
    echo "  speculators: $(python3 -c 'import speculators; print(speculators.__version__)' 2>/dev/null || true)"

    mkdir -p /output/data /output/data/hidden-states /output/checkpoints /output/logs

    # ----------------------------------------------------------------
    # Step 1: Prepare training data
    # Tokenizes sharegpt (5K samples) → Arrow files + token_freq.pt
    # Idempotent: skips if token_freq.pt already exists from a prior run.
    # ----------------------------------------------------------------
    if [ ! -f /output/data/token_freq.pt ]; then
        echo "=== [$(date)] Preparing training data (sharegpt 5K, seq 8192) ==="
        python3 "$SPEC_SCRIPTS/prepare_data.py" \
            --model unsloth/Qwen3.6-27B-NVFP4 \
            --data sharegpt \
            --output /output/data \
            --max-samples 5000 \
            --seq-length 8192 \
            2>&1 | tee /output/logs/prepare_data.log
        echo "[$(date)] Data prep done — $(ls /output/data/*.arrow 2>/dev/null | wc -l) arrow files"
    else
        echo "[$(date)] Skipping data prep — token_freq.pt exists"
    fi

    # ----------------------------------------------------------------
    # Phase 1: Generate hidden states (vLLM only — trainer NOT running)
    # util=0.75: no trainer, vLLM gets full GPU headroom.
    # max-samples=600: fits in 50 Gi PVC (600 × ~77 MB = ~46 GB).
    # NOTE: ExampleHiddenStatesConnector rejects expandable_segments:True.
    # Unset before vLLM launch; restore before Phase 2.
    # ----------------------------------------------------------------
    EXISTING_HS=$(find /output/data/hidden-states -maxdepth 1 -name "hs_*.safetensors" 2>/dev/null | wc -l)
    if [ -f /output/data/phase1_complete ]; then
        echo "[$(date)] Skipping Phase 1 — sentinel exists ($EXISTING_HS hidden states)"
    else
        echo "=== [$(date)] Phase 1: Generating hidden states ($EXISTING_HS/600 done) ==="
        unset PYTORCH_CUDA_ALLOC_CONF

        python3 "$SPEC_SCRIPTS/launch_vllm.py" unsloth/Qwen3.6-27B-NVFP4 \
            --target-layer-ids 1 16 31 46 61 \
            --hidden-states-path /output/data/hidden-states \
            -- \
            --gpu-memory-utilization 0.75 \
            --port 8001 \
            --max-model-len 8192 \
            --dtype bfloat16 \
            --trust-remote-code \
            --served-model-name main \
            --kv-cache-dtype fp8_e4m3 \
            --mamba-cache-dtype float16 \
            --mamba-ssm-cache-dtype float16 \
            --enforce-eager \
            --max-num-seqs 4 \
            > /output/logs/vllm.log 2>&1 &
        VLLM_PID=$!
        trap "echo 'Stopping vLLM (pid=$VLLM_PID)...'; kill $VLLM_PID 2>/dev/null; wait $VLLM_PID 2>/dev/null; echo 'vLLM stopped'" EXIT

        echo "=== Waiting for vLLM /health (up to 90 min) ==="
        for i in $(seq 1 540); do
            if curl -sf http://localhost:8001/health >/dev/null 2>&1; then
                echo "[$(date)] vLLM healthy after $((i * 10))s"
                break
            fi
            if ! kill -0 $VLLM_PID 2>/dev/null; then
                echo "ERROR: vLLM died. Last 80 lines:"
                tail -80 /output/logs/vllm.log
                exit 1
            fi
            [ "$i" -eq 540 ] && echo "ERROR: vLLM timeout 90 min" && exit 1
            sleep 10
        done

        curl -s http://localhost:8001/v1/models | python3 -c "import sys,json; m=json.load(sys.stdin); [print('  model:', x['id']) for x in m.get('data',[])]" 2>/dev/null || true

        # Clean stale lock files and orphaned cmpl-*.safetensors from prior crashed runs
        echo "[$(date)] Cleaning stale vLLM temp files..."
        find /output/data/hidden-states -maxdepth 1 -name "*.lock" -delete
        find /output/data/hidden-states -maxdepth 1 -name "cmpl-*.safetensors" -delete
        echo "[$(date)] Done. Running data_generation_offline.py..."

        python3 "$SPEC_SCRIPTS/data_generation_offline.py" \
            --endpoint http://localhost:8001/v1 \
            --preprocessed-data /output/data \
            --output /output/data/hidden-states \
            --max-samples 600 \
            --concurrency 4 \
            --max-consecutive-errors 10 \
            2>&1 | tee /output/logs/data_gen.log

        DATA_GEN_EXIT=${PIPESTATUS[0]}
        echo "[$(date)] Stopping vLLM..."
        kill $VLLM_PID 2>/dev/null
        wait $VLLM_PID 2>/dev/null || true
        trap - EXIT
        HS_COUNT=$(find /output/data/hidden-states -maxdepth 1 -name "hs_*.safetensors" | wc -l)
        echo "[$(date)] Phase 1 complete — $HS_COUNT hidden states generated"
        if [ "$DATA_GEN_EXIT" -eq 0 ]; then
            touch /output/data/phase1_complete
            echo "[$(date)] Sentinel written — Phase 1 will be skipped on future restarts"
        else
            echo "[$(date)] data_generation_offline.py exited $DATA_GEN_EXIT — retrying"
            exit 1
        fi
    fi

    # ----------------------------------------------------------------
    # Pre-Phase-2: Fix flex_attention backward Triton kernel for SM120.
    # Root cause (confirmed via gl/ kernel cache + device query):
    #   - DFlash backbone HEAD_DIM=256 (QK_HEAD_DIM=256 in kernel meta)
    #   - SM12.x gets its own config: sm12x lambda returns FlexBwDConfig(64,64,64,64,1,4)
    #   - SM120 optin SMEM limit = 101,376 bytes (CU_DEVICE_ATTRIBUTE_MAX_SHARED_MEMORY_PER_BLOCK_OPTIN)
    #   - 64×64 tiles: Q+K+V(3×64×256×bf16) + scores(64×64×f32) = 114,688 > 101,376 → OOM
    # Fix: patch sm12x lambda to use BLOCK_N=16 instead of 64. BLOCK_M stays
    #   64 (WGMMA M-dimension minimum). Smaller N tiles reduce K+V+scores SMEM:
    #   dKV: Q(64×256×2)+K(16×256×2)+V(16×256×2)+scores(64×16×4) = 53,248 ✓
    #   dQ:  Q+dO(2×64×256×2)+K+V(2×16×256×2)+scores(64×16×4)   = 86,016 ✓
    # Must also delete .pyc (Docker uses unchecked-hash bytecode that ignores
    #   .py modifications unless .pyc is removed first).
    # ----------------------------------------------------------------
    cat > /tmp/patch_flex_attention.py << 'PYFA'
    import os, glob

    # SM12.x (RTX PRO 6000 Blackwell) uses the sm12x config_map entry, NOT the
    # baseline FlexBwDConfig(16,16,16,16,1,4). For HEAD_DIM=256 the sm12x lambda
    # returns FlexBwDConfig(64,64,64,64,1,4), producing 114,688 bytes SMEM which
    # exceeds the SM120 optin limit of 101,376 bytes.
    #
    # Fix: replace the sm12x else-branch with BLOCK_N=16 (BLOCK_M stays 64).
    th_file = '/usr/local/lib/python3.12/dist-packages/torch/_inductor/template_heuristics/triton.py'
    if not os.path.exists(th_file):
        print('ERROR: not found:', th_file)
    else:
        c = open(th_file).read()

        OLD_SM12X = (
            '            "sm12x": lambda h: (\n'
            '                FlexBwDConfig(32, 128, 128, 32, 3, 4)\n'
            '                if h < 64\n'
            '                else FlexBwDConfig(\n'
            '                    64, 64, 64, 64, 1 if h >= 128 else 2, 4\n'
            '                )\n'
            '            ),'
        )
        NEW_SM12X = (
            '            "sm12x": lambda h: (\n'
            '                FlexBwDConfig(32, 128, 128, 32, 3, 4)\n'
            '                if h < 64\n'
            '                else FlexBwDConfig(64, 16, 64, 16, 1, 4)\n'
            '            ),'
        )

        if 'FlexBwDConfig(64, 16, 64, 16, 1, 4)' in c:
            print('Already patched sm12x BLOCK_N=16, skipping')
        elif OLD_SM12X in c:
            c = c.replace(OLD_SM12X, NEW_SM12X)
            open(th_file, 'w').write(c)
            print('Patched triton.py: sm12x FlexBwDConfig BLOCK_N 64->16')
            print('  dKV SMEM=53248 bytes, dQ SMEM=86016 bytes, limit=101376 bytes')
        else:
            print('ERROR: sm12x target not found. Dumping sm12x context:')
            idx = c.find('"sm12x"')
            if idx >= 0:
                print(repr(c[idx:idx+400]))
            else:
                print('  "sm12x" not in file at all')

        # Delete stale .pyc — Docker uses unchecked-hash bytecode that ignores
        # .py modifications unless the .pyc file is explicitly removed.
        pyc_dir = os.path.join(os.path.dirname(th_file), '__pycache__')
        deleted = []
        for pyc in glob.glob(os.path.join(pyc_dir, 'triton.cpython*')):
            os.remove(pyc)
            deleted.append(os.path.basename(pyc))
        print('Deleted .pyc:', deleted if deleted else '(none found)')
    PYFA
    python3 /tmp/patch_flex_attention.py

    # ----------------------------------------------------------------
    # Phase 2: Train from cached hidden states (no vLLM at all)
    # --on-missing skip: silently drop any samples with no cached file.
    # Config matches z-lab/Qwen3.6-27B-DFlash (block_size=16, 5 target layers)
    # ----------------------------------------------------------------
    export PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    export TORCHINDUCTOR_CACHE_DIR=/output/triton_cache
    mkdir -p /output/triton_cache
    # Clear ALL stale inductor/triton cache. The gl/ subdirectory contains
    # PyTorch inductor Python wrappers with BLOCK_N baked into the embedded
    # Triton kernel source. Clearing only triton/ leaves those stale gl/*.py
    # intact; they would re-use the old 64-wide BLOCK_N kernel on next load.
    # Nuke everything to force fresh compilation with the patched sm12x config.
    if [ -n "$(ls -A /output/triton_cache 2>/dev/null)" ]; then
        echo "[$(date)] Clearing ALL stale inductor cache (gl/ + triton/ + rest)..."
        rm -rf /output/triton_cache/*
        echo "[$(date)] Cache cleared"
    fi
    echo "=== [$(date)] Phase 2: Training from cached hidden states ==="

    if [ -d /output/checkpoints ] && [ "$(ls -A /output/checkpoints 2>/dev/null)" ]; then
        echo "[$(date)] Resuming from checkpoint:"
        ls -lh /output/checkpoints/
    else
        echo "[$(date)] Fresh training run"
    fi

    python3 "$SPEC_SCRIPTS/train.py" \
        --verifier-name-or-path unsloth/Qwen3.6-27B-NVFP4 \
        --speculator-type dspark \
        --num-layers 3 \
        --block-size 16 \
        --max-anchors 384 \
        --target-layer-ids 1 16 31 46 61 \
        --markov-rank 256 \
        --markov-head-type vanilla \
        --enable-confidence-head \
        --confidence-head-with-markov \
        --loss-fn '{"ce": 0.1, "tv": 0.9}' \
        --confidence-head-alpha 1.0 \
        --total-seq-len 2048 \
        --epochs 5 \
        --lr 3e-4 \
        --on-missing skip \
        --data-path /output/data \
        --hidden-states-path /output/data/hidden-states \
        --save-path /output/checkpoints \
        --checkpoint-freq 0.25 \
        --num-workers 2 \
        --prefetch-factor 1 \
        2>&1 | tee /output/logs/trainer.log

    echo "=== [$(date)] Training complete! ==="
    ls -lh /output/checkpoints/
    echo "Upload: huggingface-cli upload <your-repo> /output/checkpoints"
    echo "Then update vllm.yaml: method=dspark, model=<your-repo>"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: dspark-train-qwen27-20260706
  namespace: default
spec:
  backoffLimit: 200
  activeDeadlineSeconds: 172800
  template:
    spec:
      restartPolicy: OnFailure
      runtimeClassName: nvidia
      enableServiceLinks: false
      # Node disk is chronically near the eviction threshold. Two things are
      # needed to actually survive that, not just schedule past it:
      #   - the toleration lets the pod schedule despite the NoSchedule taint
      #   - Guaranteed QoS (requests == limits below) + system-node-critical
      #     priority keeps kubelet's active DiskPressure eviction from killing
      #     it — kubelet evicts Burstable/BestEffort pods under DiskPressure
      #     regardless of their actual usage; only Guaranteed pods are spared.
      # Confirmed via the disk-pressure incident this session: a Burstable
      # pod (requests set, no matching limits) got evicted within seconds of
      # scheduling purely because the DiskPressure condition was active.
      priorityClassName: system-node-critical
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: gpu-clock-lock
          image: nvcr.io/nvidia/cuda:13.0.1-base-ubi9
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: utility
          command:
            - sh
            - -c
            - |
              echo "[$(date -u +%FT%TZ)] Applying GPU mitigations before training starts..."
              nvidia-smi -pm 1
              nvidia-smi -pl 400
              echo "[$(date -u +%FT%TZ)] GPU state:"
              nvidia-smi --query-gpu=name,power.limit,persistence_mode --format=csv,noheader
      containers:
        - name: trainer
          image: vllm/vllm-openai:v0.24.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "/scripts/train.sh"]
          env:
            - name: HF_HOME
              value: /data
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: expandable_segments:True
          resources:
            limits:
              nvidia.com/gpu: 1
              cpu: "4"
              memory: 24Gi
            requests:
              cpu: "4"
              memory: 24Gi
          volumeMounts:
            - name: models
              mountPath: /data
            - name: output
              mountPath: /output
            - name: scripts
              mountPath: /scripts
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: vllm-models
        - name: output
          persistentVolumeClaim:
            claimName: dspark-output-hdd-v2
        - name: scripts
          configMap:
            name: dspark-train-script-20260706
            defaultMode: 0755
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
