# DSpark Training Run — 2026-07-06
#
# Iteration 1: sharegpt 600 samples, 5 epochs, two-phase offline.
# Node has 32 GB RAM — vLLM + trainer can't coexist (OOM). Two-phase keeps
# GPU exclusive to each: Phase 1 = vLLM only, Phase 2 = trainer only.
# 600 samples × ~77 MB/file = ~46 GB fits within the 50 Gi dspark-output PVC.
#
# Fix 1 — CPU OOM: speculators loads embed_tokens+lm_head (~7 GB) into CPU RAM
# by default. On a 32 GB node this spikes RAM past the limit. Patched speculators
# source to load directly to CUDA (GPU-to-GPU copy, no CPU staging).
# Fix 2 — Triton SM120: torch.compile fuses flex_attention backward with surrounding
# ops, producing a kernel needing 114 KB shared memory > SM120's 99 KB limit.
# Patch train.py: set max_fusion_size=1 so inductor cannot create the fused kernel.
# The standalone flex_attention backward kernel fits within 99 KB.
# Job name is date-stamped so subsequent runs can coexist in git history.
#
# To run another iteration: copy this file, increment the date, adjust flags,
# delete the old completed job (kubectl delete job dspark-train-qwen27-20260706),
# then commit and push.
#
# Scale vLLM back up: set replicas: 1 in vllm.yaml + vllm-small.yaml, commit, push.
---
# Output PVC — shared across runs, checkpoints survive pod restarts
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dspark-output
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dspark-train-script-20260706
  namespace: default
data:
  train.sh: |
    #!/bin/bash
    # DSpark two-phase training:
    # Phase 1: vLLM generates + caches hidden states (no training, full GPU util)
    # Phase 2: trainer trains from cached files (no vLLM, low RAM)
    # Node has 32 GB RAM — vLLM + trainer can't coexist. Two-phase keeps
    # them exclusive: vLLM exits before trainer starts.
    #
    # Sample count capped at 600: 600 × ~77 MB = ~46 GB fits in the 50 Gi PVC.
    # We already have 439 cached from prior runs; only ~161 more needed.
    set -euo pipefail

    export HF_HOME=/data
    export CUDA_VISIBLE_DEVICES=0
    export PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True

    echo "=== [$(date)] DSpark training job started (run 20260706) ==="

    # ----------------------------------------------------------------
    # Step 0: Install git via apt, uv for fast package management,
    #         then clone speculators repo (gets package + scripts/ in one shot).
    # ----------------------------------------------------------------
    echo "=== [$(date -u)] Installing git ==="
    apt-get update -qq 2>&1 | tail -3
    apt-get install -y git --no-install-recommends -qq
    echo "  git: $(git --version)"

    echo "=== [$(date -u)] Installing uv ==="
    pip install uv --quiet --root-user-action ignore
    export PATH="/root/.local/bin:$PATH"
    hash -r
    export HF_HUB_ENABLE_HF_TRANSFER=1

    echo "=== [$(date -u)] Cloning speculators repo ==="
    if git clone --depth=1 https://github.com/vllm-project/speculators /tmp/speculators-repo 2>&1; then
        SPEC_SCRIPTS=/tmp/speculators-repo/scripts
        # Patch speculators: load verifier weights (embed_tokens+lm_head, ~7 GB) directly
        # to GPU instead of CPU RAM. Without this, 32 GB node OOMs during train.py init.
        # Move model to CUDA before load_verifier_weights so the copy is GPU-to-GPU.
        cat > /tmp/patch_speculators.py << 'PYPATCH'
    f = '/tmp/speculators-repo/src/speculators/utils/loading.py'
    c = open(f).read().replace('device="cpu"', 'device="cuda"')
    open(f, 'w').write(c)
    print('Patched loading.py: device=cpu -> cuda')
    for f2 in [
        '/tmp/speculators-repo/src/speculators/models/dflash/core.py',
        '/tmp/speculators-repo/src/speculators/models/dspark/core.py',
    ]:
        c = open(f2).read().replace(
            'model.load_verifier_weights()',
            'model.to("cuda"); model.load_verifier_weights()'
        )
        open(f2, 'w').write(c)
        print('Patched ' + f2 + ': model.cuda() before load_verifier_weights')
    PYPATCH
        python3 /tmp/patch_speculators.py
        uv pip install /tmp/speculators-repo hf_transfer --system --quiet
    else
        echo "  git clone failed — falling back to pip install + curl"
        uv pip install speculators hf_transfer --system --quiet
        SPEC_SCRIPTS=/tmp/speculators-scripts
        mkdir -p "$SPEC_SCRIPTS/evaluate"
        BASE="https://raw.githubusercontent.com/vllm-project/speculators/main/scripts"
        curl -fsSL "$BASE/prepare_data.py"            -o "$SPEC_SCRIPTS/prepare_data.py"
        curl -fsSL "$BASE/launch_vllm.py"             -o "$SPEC_SCRIPTS/launch_vllm.py"
        curl -fsSL "$BASE/data_generation_offline.py" -o "$SPEC_SCRIPTS/data_generation_offline.py"
        curl -fsSL "$BASE/train.py"                   -o "$SPEC_SCRIPTS/train.py"
        curl -fsSL "$BASE/evaluate/evaluate.py"       -o "$SPEC_SCRIPTS/evaluate/evaluate.py" || true
    fi
    echo "  speculators: $(python3 -c 'import speculators; print(speculators.__version__)' 2>/dev/null || true)"

    mkdir -p /output/data /output/data/hidden-states /output/checkpoints /output/logs

    # ----------------------------------------------------------------
    # Step 1: Prepare training data
    # Tokenizes sharegpt (5K samples) → Arrow files + token_freq.pt
    # Idempotent: skips if token_freq.pt already exists from a prior run.
    # ----------------------------------------------------------------
    if [ ! -f /output/data/token_freq.pt ]; then
        echo "=== [$(date)] Preparing training data (sharegpt 5K, seq 8192) ==="
        python3 "$SPEC_SCRIPTS/prepare_data.py" \
            --model unsloth/Qwen3.6-27B-NVFP4 \
            --data sharegpt \
            --output /output/data \
            --max-samples 5000 \
            --seq-length 8192 \
            2>&1 | tee /output/logs/prepare_data.log
        echo "[$(date)] Data prep done — $(ls /output/data/*.arrow 2>/dev/null | wc -l) arrow files"
    else
        echo "[$(date)] Skipping data prep — token_freq.pt exists"
    fi

    # ----------------------------------------------------------------
    # Phase 1: Generate hidden states (vLLM only — trainer NOT running)
    # util=0.75: no trainer, vLLM gets full GPU headroom.
    # max-samples=600: fits in 50 Gi PVC (600 × ~77 MB = ~46 GB).
    # NOTE: ExampleHiddenStatesConnector rejects expandable_segments:True.
    # Unset before vLLM launch; restore before Phase 2.
    # ----------------------------------------------------------------
    EXISTING_HS=$(find /output/data/hidden-states -maxdepth 1 -name "hs_*.safetensors" 2>/dev/null | wc -l)
    if [ -f /output/data/phase1_complete ]; then
        echo "[$(date)] Skipping Phase 1 — sentinel exists ($EXISTING_HS hidden states)"
    else
        echo "=== [$(date)] Phase 1: Generating hidden states ($EXISTING_HS/600 done) ==="
        unset PYTORCH_CUDA_ALLOC_CONF

        python3 "$SPEC_SCRIPTS/launch_vllm.py" unsloth/Qwen3.6-27B-NVFP4 \
            --target-layer-ids 1 16 31 46 61 \
            --hidden-states-path /output/data/hidden-states \
            -- \
            --gpu-memory-utilization 0.75 \
            --port 8001 \
            --max-model-len 8192 \
            --dtype bfloat16 \
            --trust-remote-code \
            --served-model-name main \
            --kv-cache-dtype fp8_e4m3 \
            --mamba-cache-dtype float16 \
            --mamba-ssm-cache-dtype float16 \
            --enforce-eager \
            --max-num-seqs 4 \
            > /output/logs/vllm.log 2>&1 &
        VLLM_PID=$!
        trap "echo 'Stopping vLLM (pid=$VLLM_PID)...'; kill $VLLM_PID 2>/dev/null; wait $VLLM_PID 2>/dev/null; echo 'vLLM stopped'" EXIT

        echo "=== Waiting for vLLM /health (up to 90 min) ==="
        for i in $(seq 1 540); do
            if curl -sf http://localhost:8001/health >/dev/null 2>&1; then
                echo "[$(date)] vLLM healthy after $((i * 10))s"
                break
            fi
            if ! kill -0 $VLLM_PID 2>/dev/null; then
                echo "ERROR: vLLM died. Last 80 lines:"
                tail -80 /output/logs/vllm.log
                exit 1
            fi
            [ "$i" -eq 540 ] && echo "ERROR: vLLM timeout 90 min" && exit 1
            sleep 10
        done

        curl -s http://localhost:8001/v1/models | python3 -c "import sys,json; m=json.load(sys.stdin); [print('  model:', x['id']) for x in m.get('data',[])]" 2>/dev/null || true

        # Clean stale lock files and orphaned cmpl-*.safetensors from prior crashed runs
        echo "[$(date)] Cleaning stale vLLM temp files..."
        find /output/data/hidden-states -maxdepth 1 -name "*.lock" -delete
        find /output/data/hidden-states -maxdepth 1 -name "cmpl-*.safetensors" -delete
        echo "[$(date)] Done. Running data_generation_offline.py..."

        python3 "$SPEC_SCRIPTS/data_generation_offline.py" \
            --endpoint http://localhost:8001/v1 \
            --preprocessed-data /output/data \
            --output /output/data/hidden-states \
            --max-samples 600 \
            --concurrency 4 \
            --max-consecutive-errors 10 \
            2>&1 | tee /output/logs/data_gen.log

        DATA_GEN_EXIT=${PIPESTATUS[0]}
        echo "[$(date)] Stopping vLLM..."
        kill $VLLM_PID 2>/dev/null
        wait $VLLM_PID 2>/dev/null || true
        trap - EXIT
        HS_COUNT=$(find /output/data/hidden-states -maxdepth 1 -name "hs_*.safetensors" | wc -l)
        echo "[$(date)] Phase 1 complete — $HS_COUNT hidden states generated"
        if [ "$DATA_GEN_EXIT" -eq 0 ]; then
            touch /output/data/phase1_complete
            echo "[$(date)] Sentinel written — Phase 1 will be skipped on future restarts"
        else
            echo "[$(date)] data_generation_offline.py exited $DATA_GEN_EXIT — retrying"
            exit 1
        fi
    fi

    # ----------------------------------------------------------------
    # Pre-Phase-2: Fix flex_attention backward Triton kernel for SM120.
    # Qwen3.6-27B HEAD_DIM=160 means all standard autotune configs need
    # > 99 KB shared memory. Patch the inductor template to add BLOCK_M=32
    # (needs ~50 KB, fits). kernel_options only affects forward; template
    # patch is required to change the backward kernel's autotune configs.
    # ----------------------------------------------------------------
    cat > /tmp/patch_flex_attention.py << 'PYFA'
    import re

    # Patch the flex_attention Triton template (found in kernel/flex/ dir).
    # Adds BLOCK_M=32,BLOCK_N=32 to the autotune configs so the backward kernel
    # can compile on SM120 with HEAD_DIM=160 (needs ~50 KB < 99 KB limit).
    # kernel_options only controls forward; need to patch the template file.
    fa_file = '/usr/local/lib/python3.12/dist-packages/torch/_inductor/kernel/flex/flex_attention.py'
    c = open(fa_file).read()
    bm_vals = re.findall(r"'BLOCK_M'\s*:\s*(\d+)", c)
    print('flex/flex_attention.py BLOCK_M configs:', bm_vals)
    if '32' not in bm_vals and bm_vals:
        cfg32 = "    triton.Config({'BLOCK_M': 32, 'BLOCK_N': 32, 'num_stages': 1, 'num_warps': 4}),\n    "
        # Add before LAST triton.Config (backward section is typically last in the file)
        last_pos = c.rfind('triton.Config(')
        first_pos = c.find('triton.Config(')
        c2 = c[:last_pos] + cfg32 + c[last_pos:]
        if first_pos != last_pos:
            c2 = c2[:first_pos] + cfg32 + c2[first_pos:]
        open(fa_file, 'w').write(c2)
        print('Patched flex/flex_attention.py: added BLOCK_M=32 at forward+backward positions')
    else:
        print('flex/flex_attention.py: already has BLOCK_M=32 or no configs found:', bm_vals)
    PYFA
    python3 /tmp/patch_flex_attention.py

    # ----------------------------------------------------------------
    # Phase 2: Train from cached hidden states (no vLLM at all)
    # --on-missing skip: silently drop any samples with no cached file.
    # Config matches z-lab/Qwen3.6-27B-DFlash (block_size=16, 5 target layers)
    # ----------------------------------------------------------------
    export PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    echo "=== [$(date)] Phase 2: Training from cached hidden states ==="

    if [ -d /output/checkpoints ] && [ "$(ls -A /output/checkpoints 2>/dev/null)" ]; then
        echo "[$(date)] Resuming from checkpoint:"
        ls -lh /output/checkpoints/
    else
        echo "[$(date)] Fresh training run"
    fi

    python3 "$SPEC_SCRIPTS/train.py" \
        --verifier-name-or-path unsloth/Qwen3.6-27B-NVFP4 \
        --speculator-type dspark \
        --num-layers 3 \
        --block-size 16 \
        --max-anchors 1536 \
        --target-layer-ids 1 16 31 46 61 \
        --markov-rank 256 \
        --markov-head-type vanilla \
        --enable-confidence-head \
        --confidence-head-with-markov \
        --loss-fn '{"ce": 0.1, "tv": 0.9}' \
        --confidence-head-alpha 1.0 \
        --total-seq-len 8192 \
        --epochs 5 \
        --lr 3e-4 \
        --on-missing skip \
        --data-path /output/data \
        --hidden-states-path /output/data/hidden-states \
        --save-path /output/checkpoints \
        --checkpoint-freq 0.25 \
        --num-workers 2 \
        --prefetch-factor 1 \
        2>&1 | tee /output/logs/trainer.log

    echo "=== [$(date)] Training complete! ==="
    ls -lh /output/checkpoints/
    echo "Upload: huggingface-cli upload <your-repo> /output/checkpoints"
    echo "Then update vllm.yaml: method=dspark, model=<your-repo>"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: dspark-train-qwen27-20260706
  namespace: default
spec:
  backoffLimit: 200
  activeDeadlineSeconds: 172800
  template:
    spec:
      restartPolicy: OnFailure
      runtimeClassName: nvidia
      enableServiceLinks: false
      initContainers:
        - name: gpu-clock-lock
          image: nvcr.io/nvidia/cuda:13.0.1-base-ubi9
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: utility
          command:
            - sh
            - -c
            - |
              echo "[$(date -u +%FT%TZ)] Applying GPU mitigations before training starts..."
              nvidia-smi -pm 1
              nvidia-smi -pl 400
              echo "[$(date -u +%FT%TZ)] GPU state:"
              nvidia-smi --query-gpu=name,power.limit,persistence_mode --format=csv,noheader
      containers:
        - name: trainer
          image: vllm/vllm-openai:v0.24.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "/scripts/train.sh"]
          env:
            - name: HF_HOME
              value: /data
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: expandable_segments:True
          resources:
            limits:
              nvidia.com/gpu: 1
            requests:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: models
              mountPath: /data
            - name: output
              mountPath: /output
            - name: scripts
              mountPath: /scripts
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: vllm-models
        - name: output
          persistentVolumeClaim:
            claimName: dspark-output
        - name: scripts
          configMap:
            name: dspark-train-script-20260706
            defaultMode: 0755
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
