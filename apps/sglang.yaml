# SGLang Deployment - alternative inference engine for Qwen3.6-27B-NVFP4
#
# VALIDATED WORKING as of 2026-06-17 on SM120 (RTX PRO 6000 Blackwell).
# Tested: responded correctly to /v1/chat/completions. Startup takes ~5 min.
#
# Side-by-side with vLLM for experimentation. Scaled down (replicas: 0) by default
# since both can't hold the GPU at the same time.
#
# To swap from vLLM to SGLang (edit YAML, commit, push — no kubectl scale):
#   apps/sglang.yaml:  replicas: 0 → 1
#   apps/vllm.yaml:    replicas: 1 → 0
#
# Endpoints: sglang.hoam.lan (OpenAI-compatible /v1/chat/completions)
# Model: same unsloth/Qwen3.6-27B-NVFP4, cached on shared vllm-models PVC
#
# Notable SGLang features active here:
#   - MambaRadixCache prefix cache — hybrid SSM+attention variant of RadixAttention,
#     shares prefixes across concurrent requests (system prompts, tool definitions)
#   - Regular CUDA graphs (piecewise disabled — incompatible with hybrid Mamba/GDN)
#   - FlashInfer attention backend (FA3 requires SM80-90; SM120 needs FlashInfer)
#   - Spec Decoding V2 + DFLASH kernels available (not enabled — EAGLE on NVFP4 is
#     untested; measure baseline before turning on)
#
# SM120 / Qwen3.6-27B-NVFP4 compatibility notes (hard-won):
#   - --attention-backend=flashinfer  (NOT fa3 — fa3 asserts on SM120)
#   - --kv-cache-dtype=fp8_e4m3       (NOT nvfp4 — nvfp4 KV needs PyTorch dtype support)
#   - --enable-torch-compile REMOVED  (OOMs during CUDA graph autotuning on 27B+fp8)
#   - page_size auto-corrected to 1   (Mamba no_buffer scheduling requires this)
#   - timeoutSeconds: 30 on probes    (health endpoint runs a warmup inference ~30s)
#   - unsloth/Qwen3.6-27B-NVFP4 uses compressed-tensors quant — auto-detected, no arg
#   - Shares the same GSP firmware bug surface as vLLM (driver-level, not engine)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sglang-qwen27
  namespace: default
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sglang
      model: qwen27
  template:
    metadata:
      labels:
        app: sglang
        model: qwen27
    spec:
      runtimeClassName: nvidia
      enableServiceLinks: false
      containers:
        - name: sglang
          image: lmsysorg/sglang:v0.5.13-cu130
          command:
            - python3
            - -m
            - sglang.launch_server
            - "--model-path=unsloth/Qwen3.6-27B-NVFP4"
            - "--served-model-name=main"
            - "--host=0.0.0.0"
            - "--port=30000"
            - "--tp=1"
            - "--kv-cache-dtype=fp8_e4m3"
            - "--context-length=196608"
            # SGLang's static memory pre-allocation fraction (not vLLM's gpu-mem-util)
            - "--mem-fraction-static=0.88"
            - "--max-running-requests=16"
            - "--chunked-prefill-size=8192"
            - "--page-size=32"
            # FlashInfer is the correct backend for SM120 (Blackwell);
            # FA3 requires SM80-90, FA4 is SM100-only.
            - "--attention-backend=flashinfer"
            - "--tool-call-parser=qwen3_coder"
            - "--reasoning-parser=qwen3"
            - "--trust-remote-code"
            - "--watchdog-timeout=600"
          ports:
            - containerPort: 30000
          env:
            - name: HF_HOME
              value: /data
            - name: HUGGINGFACE_HUB_CACHE
              value: /data/hub
            - name: SGLANG_USE_MODELSCOPE
              value: "false"
            - name: FLASHINFER_DISABLE_VERSION_CHECK
              value: "1"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
          resources:
            limits:
              nvidia.com/gpu: 1
            requests:
              cpu: "1"
              memory: 8Gi
          volumeMounts:
            - name: models
              mountPath: /data
            - name: shm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: 30000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 120
            timeoutSeconds: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 30000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 30
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: vllm-models
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: sglang
  namespace: default
spec:
  selector:
    app: sglang
    model: qwen27
  ports:
    - port: 80
      targetPort: 30000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sglang
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: private
  rules:
    - host: sglang.hoam.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sglang
                port:
                  number: 80
