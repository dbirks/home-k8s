# Shepherd — GHCR pull credentials
#
# ghcr.io/dbirks/shepherd-agents/{api,ui} are private packages (the source
# repo is private, so the packages inherit private visibility). Two copies
# of the same dockerconfigjson are needed:
#   - default ns: imagePullSecrets on the shepherd-api/shepherd-web Deployments
#   - flux-system ns: secretRef on the ImageRepository objects (the
#     image-reflector-controller needs its own credential to list tags)
#
# PLACEHOLDER CREDENTIALS: the password below is a dummy string, not a real
# token. Until this is replaced, both the Deployments (ImagePullBackOff) and
# the ImageRepository scans (auth errors) will fail. To fix:
#   1. Mint a GitHub PAT (classic) with `read:packages` scope, scoped to
#      dbirks/shepherd-agents (or make the packages public and delete this
#      follow-up + the imagePullSecrets/secretRef references instead).
#   2. sops apps/shepherd-ghcr-pull.enc.yaml
#   3. Replace both `.dockerconfigjson` values with the output of:
#      kubectl create secret docker-registry ghcr-pull \
#        --docker-server=ghcr.io --docker-username=dbirks \
#        --docker-password=<PAT> --docker-email=none@example.com \
#        --dry-run=client -o jsonpath='{.data.__dockerconfigjson}'
#      (base64-encoded value goes directly in `data:`, or decode it for
#      `stringData:` — either works since sops only touches these keys.)
apiVersion: v1
kind: Secret
metadata:
    name: ghcr-pull
    namespace: default
type: kubernetes.io/dockerconfigjson
data:
    .dockerconfigjson: ENC[AES256_GCM,data:,iv:ACmgprJbVBfKe6mXXzWHATbjJtvLh0a7QgHIEOsggRs=,tag:4M4C073o06iwim0acCsGJw==,type:str]
