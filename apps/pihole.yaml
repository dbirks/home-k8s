apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pihole
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: pihole
      # Current version found here:
      # https://github.com/MoJo2600/pihole-kubernetes/blob/main/charts/pihole/Chart.yaml#L7
      version: 2.35.0
      sourceRef:
        kind: HelmRepository
        name: mojo2600
        namespace: flux-system
      interval: 5m
  # Default values:
  # https://github.com/MoJo2600/pihole-kubernetes/blob/main/charts/pihole/values.yaml
  values:
    image:
      # The locally cached 2025.11.1 image on this node produces "Exec format
      # error" / libcrypto.so.3 load failures (classic architecture-mismatch
      # symptom) on every restart, crash-looping all 4 replicas for 2+ days.
      # ingress-nginx (unrelated deployment, same node) started failing at the
      # same time with a similar "symbol not found" error, pointing at a
      # shared node-level image-cache issue rather than anything pihole- or
      # ingress-nginx-specific. Bumping to a newer tag the node has never
      # cached (rather than relying on pullPolicy alone) forces an
      # unambiguous fresh pull.
      tag: "2026.07.2"
      pullPolicy: Always

    serviceDns:
      mixedService: true
      type: LoadBalancer
      # loadBalancerIP: 10.0.0.202
      annotations:
        metallb.universe.tf/loadBalancerIPs: 10.0.0.202

    serviceDhcp:
      enabled: false

    serviceWeb:
      http:
        enabled: true
        port: 80
      https:
        enabled: false

    ingress:
      enabled: true
      ingressClassName: private
      path: /
      hosts:
        - pihole-webui.hoam.lan

    virtualHost: pihole-webui.hoam.lan

    persistentVolumeClaim:
      enabled: true

    # -- default upstream DNS 1 server to use
    DNS1: "1.1.1.1"
    # -- default upstream DNS 2 server to use
    DNS2: "8.8.4.4"
