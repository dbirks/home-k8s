# OpenHands Agent Canvas
#
# Agent Canvas is OpenHands' all-in-one container: React frontend, agent server,
# and automation backend — all behind a single port (8000). No Docker socket
# needed; agents connect to external LLM APIs directly.
#
# Deployed via OpenHands' own official Helm chart (added in agent-canvas
# v1.4.0), sourced straight from their git repo -- see
# prereqs/helm-repos/openhands.yaml for why this uses a GitRepository
# instead of a HelmRepository/OCIRepository. The chart runs the app as a
# StatefulSet with a single PVC (via volumeClaimTemplates) rather than the
# hand-rolled Deployment + two PVCs this used to be.
#
# NOTE: migrated from raw manifests on 2026-07-14. The old openhands-state /
# openhands-projects PVCs were deleted rather than migrated -- this instance
# was brand new and nothing in it needed to survive (see git history for the
# prior hand-written version if needed as reference).
#
# FIRST-TIME SETUP (after pod comes up):
#   1. Open http://openhands.hoam.lan
#   2. Settings → LLM → Add profile:
#        Provider:  OpenAI-compatible
#        Base URL:  http://vllm.hoam.lan/v1
#        Model:     main
#        API Key:   dummy
#   3. Save and start a conversation
#
# Storage: one local-path PVC (chart default 20Gi, via volumeClaimTemplates),
# holding both ~/.openhands (settings, secrets, conversation history,
# automation SQLite DB) and ~/workspace (code workspaces) via subPath mounts.
# OH_SECRET_KEY / session API key are auto-generated on first start and
# stored on that PVC, so they survive pod restarts.
#
# Endpoints: openhands.hoam.lan (private ingress)
#
# Chart defaults reference: https://github.com/OpenHands/agent-canvas/blob/v1.4.0/helm/agent-canvas/values.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openhands
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: ./helm/agent-canvas
      sourceRef:
        kind: GitRepository
        name: openhands-agent-canvas
        namespace: flux-system
      interval: 1m
  values:
    # Chart's appVersion is pinned to 1.2.0 (last bumped when the chart was
    # added); override to the image tag we actually want to run.
    image:
      tag: "1.4.0"

    # Give the StatefulSet's single fullname a predictable, short name
    # instead of the chart default (release name + "agent-canvas" combined).
    nameOverride: openhands
    fullnameOverride: openhands

    # Resources match the previous hand-written Deployment (and happen to
    # equal the chart's own defaults already, so this is just documenting
    # the choice, not deviating from it).
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"

    config:
      # AUTOMATION_BASE_URL isn't set by the chart itself (only PORT /
      # AGENT_SERVER_PORT / AUTOMATION_PORT are) -- pass it through so the
      # automation backend advertises the right externally-reachable URL.
      extraEnv:
        - name: AUTOMATION_BASE_URL
          value: "http://openhands.hoam.lan"

    ingress:
      enabled: true
      className: private
      annotations:
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-body-size: "100m"
      hosts:
        - host: openhands.hoam.lan
          paths:
            - path: /
              pathType: Prefix

  # Workaround for a known Kubernetes limitation (not specific to this
  # chart): fsGroup-based chown only applies to a subPath target the FIRST
  # time kubelet creates it, and on a brand-new PVC that creation happens as
  # root, before the pod's securityContext.fsGroup is applied -- so the
  # openhands (uid 10001) process gets a permission-denied trying to write
  # to /home/openhands/.openhands and /home/openhands/workspace (both
  # subPath mounts of the chart's single "data" PVC). Confirmed live: the
  # agent-server and automation backend both failed to start with "unable
  # to open database file" / EACCES until this ran.
  #
  # Fix: an initContainer that mounts the whole PVC (no subPath) and
  # pre-creates + chowns the two subPath directories before the main
  # container starts. Injected via postRenderers since the chart doesn't
  # expose an initContainers value.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: StatefulSet
              name: openhands
            patch: |
              apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                name: openhands
              spec:
                template:
                  spec:
                    initContainers:
                      - name: fix-data-perms
                        image: busybox:1.36
                        command:
                          - sh
                          - -c
                          - |
                            mkdir -p /data/openhands /data/workspace
                            chown -R 10001:10001 /data/openhands /data/workspace
                        securityContext:
                          runAsUser: 0
                          runAsGroup: 0
                          runAsNonRoot: false
                        volumeMounts:
                          - name: data
                            mountPath: /data
