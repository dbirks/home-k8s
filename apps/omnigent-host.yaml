# Omnigent persistent K8s host
#
# Runs `omnigent host` pointed at the in-cluster server. When you create
# a session in the Omnigent web UI and pick Pi harness, it spawns a Pi
# subprocess here configured to talk to local vLLM via in-cluster DNS.
#
# Agent/runner distinction:
#   Pi   → models.json → vllm.default.svc.cluster.local (local vLLM)
#   claude → subscription auth (no API key in this pod — use locally)
#   codex  → subscription auth (no API key in this pod — use locally)
#
# IS_SANDBOX=1 is already set in the image ENV.
# Pi config is written from the ConfigMap below at container start.
# A wrapper around the pi binary pre-selects vllm/main so Pi doesn't
# fall back to its default google provider when spawned headlessly.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pi-models-config
  namespace: omnigent
data:
  models.json: |
    {
      "providers": {
        "vllm": {
          "baseUrl": "http://vllm.default.svc.cluster.local/v1",
          "api": "openai-completions",
          "apiKey": "dummy",
          "models": [
            {
              "id": "main",
              "name": "Qwen3.6-27B (local vLLM)",
              "reasoning": false,
              "input": ["text", "image"],
              "contextWindow": 262144,
              "maxTokens": 65536,
              "cost": { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 }
            }
          ]
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnigent-host
  namespace: omnigent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: omnigent-host
  template:
    metadata:
      labels:
        app: omnigent-host
    spec:
      initContainers:
        # Write Pi config before the host process starts so Pi finds its
        # models.json immediately. The directory must exist first — Pi
        # doesn't create it until the first /model command.
        - name: pi-config-init
          image: busybox:1.37
          command:
            - /bin/sh
            - -c
            - "mkdir -p /root/.pi/agent && cp /etc/pi-config/models.json /root/.pi/agent/models.json"
          volumeMounts:
            - name: pi-config
              mountPath: /etc/pi-config
            - name: home
              mountPath: /root
      containers:
        - name: host
          # v0.3.0 (rebuilt 2026-06-28)
          image: ghcr.io/omnigent-ai/omnigent-host@sha256:d0f5bd972c089f4fc745c4b43b56d49761fd110d0719c4faba69a49a81cb32c7
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              cp /usr/local/bin/pi /tmp/pi-real \
              && printf '#!/bin/sh\nexec /tmp/pi-real --model vllm/main "$@"\n' \
                   > /usr/local/bin/pi \
              && chmod +x /usr/local/bin/pi \
              && omnigent host --server http://omnigent.omnigent.svc.cluster.local
          # No auth env vars — server runs in no-auth mode (single-user home lab)
          # No ANTHROPIC_API_KEY or OPENAI_API_KEY — Pi uses models.json (see
          # initContainer), Claude Code and Codex use subscription auth locally.
          resources:
            requests:
              memory: 2Gi
              cpu: 500m
            limits:
              memory: 8Gi
              cpu: 4000m
          volumeMounts:
            - name: home
              mountPath: /root
            - name: workspace
              mountPath: /root/workspace
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: pi-config
          configMap:
            name: pi-models-config
        # Shared home dir so initContainer's Pi config persists to main container
        - name: home
          emptyDir: {}
        - name: workspace
          emptyDir: {}
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
