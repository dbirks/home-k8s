# ALTERNATIVE: Qwen3.5-35B-A3B (GPTQ-Int4) - BROKEN ON i5-6600K
# =====================================================================
# Mamba/DeltaNet hybrid architecture causes Triton OOM during profiling.
# Replace the command args above with:
#   - stelterlab/Qwen3-Coder-30B-A3B-Instruct-AWQ
#   + Qwen/Qwen3.5-35B-A3B-GPTQ-Int4
#   + "--reasoning-parser=qwen3"
#   + "--enforce-eager"
#   + "--max-num-batched-tokens=2096"
#   - "--quantization=awq_marlin"
#   + "--quantization=gptq_marlin"
#   Change --served-model-name to qwen35
#   Change --max-model-len to 16384
#   Change --gpu-memory-utilization to 0.80

