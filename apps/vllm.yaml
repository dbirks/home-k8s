# vLLM Deployment - Qwen3.6-27B + Granite Speech sidecar
#
# Main model: unsloth/Qwen3.6-27B-NVFP4 (coding LLM)
#   - Hybrid DeltaNet+Attention architecture, 27B dense, NVFP4 quantization
#   - 77.2% SWE-bench Verified (base model)
#   - Served as "main" and "qwen27" on port 8000
#   - Speculative decoding: our own DSpark drafter (dbirks/Qwen3.6-27b-DSpark,
#     v1, accept_len 1.5098 in isolated benchmarks -- real measured
#     throughput speedup 1.28x-1.36x depending on concurrency). See issue #51
#     for the full training story and known limitations.
#
# Native sidecar: ibm-granite/granite-speech-4.1-2b (speech-to-text)
#   - 2B params, ~4GB VRAM
#   - OpenAI-compatible /v1/audio/transcriptions endpoint
#   - Served as "granite-speech" on port 8001
#   - Starts FIRST via K8s native sidecar (initContainer + restartPolicy: Always)
#   - Must pass startupProbe before main model begins loading
#
# Claude Code connection:
#   ANTHROPIC_BASE_URL=http://vllm.hoam.lan
#   ANTHROPIC_API_KEY=dummy
#   ANTHROPIC_AUTH_TOKEN=dummy
#   ANTHROPIC_DEFAULT_OPUS_MODEL=main
#   ANTHROPIC_DEFAULT_SONNET_MODEL=main
#   ANTHROPIC_DEFAULT_HAIKU_MODEL=main
#   claude
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-models
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 150Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen27
  namespace: default
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm
      model: qwen27
  template:
    metadata:
      labels:
        app: vllm
        model: qwen27
    spec:
      runtimeClassName: nvidia
      enableServiceLinks: false
      # granite-speech sidecar disabled — sharing one GPU between two vLLM
      # processes causes unrecoverable GPU device handle errors when the main
      # container crashes. Revisit when vLLM adds multi-model support or
      # GPU time-slicing is stable. Config preserved in git history.
      containers:
        - name: vllm
          # v0.25.0's *native* dspark serving method crashes reproducibly
          # with a CUDA illegal-memory-access during draft-attention-metadata
          # construction -- confirmed across 5 separate attempts varying KV
          # cache dtype, --enforce-eager, and other flags (see issue #51).
          # This nightly wheel is what every one of our benchmark runs
          # actually used successfully -- it has DSpark support (since
          # ~2026-07-01) via the same speculators checkpoint format, just not
          # v0.25.0's newer, buggier native code path.
          image: vllm/vllm-openai:nightly-95ed0feaa5cd7fb16d72c53ce04950aaf07c4698
          command:
            - vllm
            - serve
            - unsloth/Qwen3.6-27B-NVFP4
            - "--host=0.0.0.0"
            - "--port=8000"
            - "--served-model-name"
            - main
            - qwen27
            - "--max-model-len=262144"
            - "--dtype=bfloat16"
            - "--gpu-memory-utilization=0.60"
            - "--max-num-seqs=16"
            - "--kv-cache-dtype=fp8_e4m3"
            # DeltaNet recurrent state cannot be FP8 — must be float16
            - "--mamba-cache-dtype=float16"
            - "--mamba-ssm-cache-dtype=float16"
            # --enforce-eager (not PIECEWISE cudagraphs) -- matches the exact
            # config every one of our benchmark runs verified working. Never
            # tested dspark + cudagraphs enabled on this nightly wheel; safer
            # to match the proven config for a production deployment and
            # revisit cudagraphs as a later optimization once this is stable.
            - "--enforce-eager"
            - "--enable-prefix-caching"
            - "--trust-remote-code"
            - "--enable-auto-tool-choice"
            - "--tool-call-parser=qwen3_coder"
            - "--reasoning-parser=qwen3"
            - "--performance-mode=throughput"
            - "--max-num-batched-tokens=8192"
            - "--speculative-config"
            - '{"method":"dspark","model":"dbirks/Qwen3.6-27b-DSpark","num_speculative_tokens":15}'
          ports:
            - containerPort: 8000
          env:
            - name: HF_HOME
              value: /data
            # Authenticated HF downloads (faster, no rate limits)
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
            # Enable FlashInfer CUTLASS NVFP4 MoE kernel path on SM120
            - name: VLLM_USE_FLASHINFER_MOE_MXFP4_MXFP8
              value: "1"
            - name: VLLM_FLASHINFER_MOE_BACKEND
              value: latency
            # Ensure FlashInfer JIT targets SM120 explicitly across upgrades
            - name: FLASHINFER_CUDA_ARCH_LIST
              value: 12.0f
            - name: FLASHINFER_FORCE_SM
              value: 120f
            # Reduce allocator fragmentation under prefix caching
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: expandable_segments:True
          resources:
            limits:
              nvidia.com/gpu: 1
            requests:
              cpu: "1"
              memory: 8Gi
          volumeMounts:
            - name: models
              mountPath: /data
            - name: shm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 120
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: vllm-models
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: default
spec:
  selector:
    app: vllm
    model: qwen27
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: granite-speech
  namespace: default
spec:
  selector:
    app: vllm
    model: qwen27
  ports:
    - port: 80
      targetPort: 8001
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vllm
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: private
  rules:
    - host: vllm.hoam.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vllm
                port:
                  number: 80
    - host: llm.hoam.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vllm
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: granite-speech
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
spec:
  ingressClassName: private
  rules:
    - host: speech.hoam.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: granite-speech
                port:
                  number: 80
