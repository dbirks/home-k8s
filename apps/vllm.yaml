# =====================================================================
# vLLM Deployment - Qwen3.6-35B-A3B (AWQ 4-bit)
# =====================================================================
# Architecture: GatedDeltaNet hybrid MoE (35B total, 3B active per token)
# VRAM: ~24GB weights (AWQ), leaves ~6GB for KV cache on RTX 5090
# Tool calling: qwen3_coder parser + qwen3 reasoning parser
# Anthropic /v1/messages API: native in vLLM v0.19+
#
# Claude Code connection:
#   ANTHROPIC_BASE_URL=http://vllm.hoam.lan
#   ANTHROPIC_API_KEY=dummy
#   ANTHROPIC_AUTH_TOKEN=dummy
#   ANTHROPIC_DEFAULT_OPUS_MODEL=main
#   ANTHROPIC_DEFAULT_SONNET_MODEL=main
#   ANTHROPIC_DEFAULT_HAIKU_MODEL=main
#   DISABLE_PROMPT_CACHING=1
#   claude
#
# To switch models, change the command args below and commit.
# See commented alternatives at the bottom of this file.
# Docs: https://docs.vllm.ai/en/latest/serving/integrations/claude_code/
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-models
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      # Shared model cache - holds multiple models across switches
      storage: 150Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: default
spec:
  replicas: 1
  # Recreate strategy - only one pod can hold the GPU at a time
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      runtimeClassName: nvidia
      # CRITICAL: disable K8s service links injection. The service named "vllm"
      # creates VLLM_PORT env var which conflicts with vLLM's own VLLM_PORT env.
      enableServiceLinks: false
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.19.1
          command:
            - vllm
            - serve
            - cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit
            - "--host=0.0.0.0"
            - "--port=8000"
            # "main" is the stable alias - point all agents here so you can
            # swap the underlying model without updating agent configs.
            - "--served-model-name"
            - "main"
            - "qwen36"
            # Native 256K context - vLLM dynamically allocates KV cache per request
            - "--max-model-len=262144"
            - "--dtype=bfloat16"
            # 95% GPU memory for max KV cache
            - "--gpu-memory-utilization=0.95"
            # Reduced from 8 — model weights are ~24GB, less KV cache headroom
            - "--max-num-seqs=4"
            # FP8 E4M3 KV cache - doubles KV capacity vs BF16
            - "--kv-cache-dtype=fp8_e4m3"
            # Prefix caching - reuses KV cache for repeated system prompts
            - "--enable-prefix-caching"
            # Required for Qwen model architecture code
            - "--trust-remote-code"
            # Skip vision encoder — text-only use saves VRAM for KV cache
            - "--language-model-only"
            # Enable tool calling (required for Claude Code / Agent SDK)
            - "--enable-auto-tool-choice"
            - "--tool-call-parser=qwen3_coder"
            # Reasoning/thinking mode parser for <think> blocks
            - "--reasoning-parser=qwen3"
            # GatedDeltaNet Mamba cache requires block_size <= max_num_batched_tokens
            - "--max-num-batched-tokens=2096"
          ports:
            - containerPort: 8000
          env:
            - name: HF_HOME
              value: /data
          resources:
            limits:
              nvidia.com/gpu: 1
            requests:
              cpu: "1"
              memory: 8Gi
          volumeMounts:
            - name: models
              mountPath: /data
            - name: shm
              mountPath: /dev/shm
          # Generous startup probe - model download can take a while
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 120
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: vllm-models
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: default
spec:
  selector:
    app: vllm
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vllm
  namespace: default
spec:
  ingressClassName: private
  rules:
    - host: vllm.hoam.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vllm
                port:
                  number: 80

# =====================================================================
# FALLBACK: Qwen3-Coder-30B-A3B-Instruct (AWQ 4-bit)
# =====================================================================
# Standard transformer MoE, proven stable. ~15GB weights leaves plenty
# of KV cache. Use if Qwen3.6 GatedDeltaNet architecture has issues.
# Replace the command args above with:
#   - cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit
#   + stelterlab/Qwen3-Coder-30B-A3B-Instruct-AWQ
#   Change --served-model-name to "main" "qwen3-coder"
#   Change --max-num-seqs to 8
#   Remove --language-model-only
#   Remove --reasoning-parser=qwen3

