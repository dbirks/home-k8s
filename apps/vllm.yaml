# vLLM Deployment - Qwen3.6-27B + Granite Speech sidecar
#
# Main model: unsloth/Qwen3.6-27B-NVFP4 (coding LLM)
#   - Hybrid DeltaNet+Attention architecture, 27B dense, NVFP4 quantization
#   - 77.2% SWE-bench Verified (base model)
#   - Served as "main" and "qwen27" on port 8000
#
# Native sidecar: ibm-granite/granite-speech-4.1-2b (speech-to-text)
#   - 2B params, ~4GB VRAM
#   - OpenAI-compatible /v1/audio/transcriptions endpoint
#   - Served as "granite-speech" on port 8001
#   - Starts FIRST via K8s native sidecar (initContainer + restartPolicy: Always)
#   - Must pass startupProbe before main model begins loading
#
# GPU: shares the single physical RTX PRO 6000 Blackwell with the
#   autoresearch pod via k8s device-plugin time-slicing (this workstation
#   SKU has no MIG support — see prereqs/nvidia-device-plugin.yaml).
#   --gpu-memory-utilization reduced to 0.50 to leave ~48GB free.
#
# Claude Code connection:
#   ANTHROPIC_BASE_URL=http://vllm.hoam.lan
#   ANTHROPIC_API_KEY=dummy
#   ANTHROPIC_AUTH_TOKEN=dummy
#   ANTHROPIC_DEFAULT_OPUS_MODEL=main
#   ANTHROPIC_DEFAULT_SONNET_MODEL=main
#   ANTHROPIC_DEFAULT_HAIKU_MODEL=main
#   claude
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-models
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 150Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen27
  namespace: default
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm
      model: qwen27
  template:
    metadata:
      labels:
        app: vllm
        model: qwen27
    spec:
      runtimeClassName: nvidia
      enableServiceLinks: false
      # granite-speech sidecar disabled — sharing one GPU between two vLLM
      # processes causes unrecoverable GPU device handle errors when the main
      # container crashes. Revisit when vLLM adds multi-model support or
      # GPU time-slicing is stable. Config preserved in git history.
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.24.0
          command:
            - vllm
            - serve
            - unsloth/Qwen3.6-27B-NVFP4
            - "--host=0.0.0.0"
            - "--port=8000"
            - "--served-model-name"
            - main
            - qwen27
            - "--max-model-len=131072"
            - "--dtype=bfloat16"
            # Dropped from 0.90 — the autoresearch StatefulSet time-slices this
            # same physical GPU (see prereqs/nvidia-device-plugin.yaml). 0.50
            # (~48GB) wasn't enough headroom: autoresearch's baseline actually
            # peaks around ~48-50GB shared on this card (not the ~45GB
            # SETUP.md quoted from an unshared H100 run), and OOM'd on step 1.
            # 0.45 (~43GB) still leaves a large fp8 KV cache, well above what
            # coding-agent traffic needs.
            - "--gpu-memory-utilization=0.45"
            - "--max-num-seqs=16"
            - "--kv-cache-dtype=fp8_e4m3"
            # Narrow CUDA Graph capture to decode only — research suggests
            # full-graph replay is a stressor on the Blackwell GSP firmware
            # bug (see issue #46). Keeps decode-loop perf with eager prefill.
            - "--compilation-config"
            - '{"cudagraph_mode":"FULL_DECODE_ONLY"}'
            - "--enable-prefix-caching"
            - "--trust-remote-code"
            - "--enable-auto-tool-choice"
            - "--tool-call-parser=qwen3_coder"
            - "--reasoning-parser=qwen3"
            - "--performance-mode=throughput"
            - "--max-num-batched-tokens=8192"
            - "--speculative-config"
            - '{"method":"dflash","model":"z-lab/Qwen3.6-27B-DFlash","num_speculative_tokens":16}'
          ports:
            - containerPort: 8000
          env:
            - name: HF_HOME
              value: /data
            # Authenticated HF downloads (faster, no rate limits)
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
          resources:
            limits:
              nvidia.com/gpu: 1
            requests:
              cpu: "1"
              memory: 8Gi
          volumeMounts:
            - name: models
              mountPath: /data
            - name: shm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 120
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: vllm-models
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: default
spec:
  selector:
    app: vllm
    model: qwen27
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: granite-speech
  namespace: default
spec:
  selector:
    app: vllm
    model: qwen27
  ports:
    - port: 80
      targetPort: 8001
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vllm
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: private
  rules:
    - host: vllm.hoam.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vllm
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: granite-speech
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
spec:
  ingressClassName: private
  rules:
    - host: speech.hoam.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: granite-speech
                port:
                  number: 80
