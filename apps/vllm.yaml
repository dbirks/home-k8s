# =====================================================================
# vLLM Deployment - Qwen3-Coder-30B-A3B-Instruct (AWQ 4-bit)
# =====================================================================
# Architecture: Standard transformer MoE (30B total, 3B active per token)
# VRAM: ~15GB weights (AWQ), leaves ~15GB for KV cache on RTX 5090
# Benchmarked on RTX 5090: ~1,157 tok/s throughput
# Tool calling: dedicated qwen3_coder parser in vLLM
# Anthropic /v1/messages API: native in vLLM v0.19+
#
# Claude Code connection:
#   ANTHROPIC_BASE_URL=http://vllm.hoam.lan
#   ANTHROPIC_API_KEY=dummy
#   ANTHROPIC_DEFAULT_OPUS_MODEL=qwen3-coder
#   ANTHROPIC_DEFAULT_SONNET_MODEL=qwen3-coder
#   ANTHROPIC_DEFAULT_HAIKU_MODEL=qwen3-coder
#   DISABLE_PROMPT_CACHING=1
#   claude
#
# To switch models, change the command args below and commit.
# See commented alternatives at the bottom of this file.
# Docs: https://docs.vllm.ai/en/latest/serving/integrations/claude_code/
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-models
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      # Shared model cache - holds multiple models across switches
      storage: 150Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: default
spec:
  replicas: 1
  # Recreate strategy - only one pod can hold the GPU at a time
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      runtimeClassName: nvidia
      # CRITICAL: disable K8s service links injection. The service named "vllm"
      # creates VLLM_PORT env var which conflicts with vLLM's own VLLM_PORT env.
      enableServiceLinks: false
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          command:
            - vllm
            - serve
            - stelterlab/Qwen3-Coder-30B-A3B-Instruct-AWQ
            - "--host=0.0.0.0"
            - "--port=8000"
            # "main" is the stable alias - point all agents here so you can
            # swap the underlying model without updating agent configs.
            # "qwen3-coder" is the specific model name if you want to be explicit.
            - "--served-model-name"
            - "main"
            - "qwen3-coder"
            # Claude Code sends ~17K system prompt + requests 32K output tokens
            # 128K gives plenty of headroom for conversation context growth
            - "--max-model-len=131072"
            - "--dtype=bfloat16"
            # 95% GPU memory - squeeze out max KV cache on dedicated inference GPU
            - "--gpu-memory-utilization=0.95"
            # Up to 4 concurrent sequences
            - "--max-num-seqs=4"
            # Note: fp8_e5m2 KV cache is incompatible with this model's compressed-tensors format
            # - "--kv-cache-dtype=fp8_e5m2"
            # Prefix caching - reuses KV cache for repeated system prompts
            - "--enable-prefix-caching"
            # Auto-detect quantization format (this model uses compressed-tensors)
            # - "--quantization=awq_marlin"  # Don't override - model config knows its format
            # Required for Qwen model architecture code
            - "--trust-remote-code"
            # Skip CUDA graphs to free VRAM for KV cache (graphs eat ~3-5GB)
            - "--enforce-eager"
            # Enable tool calling (required for Claude Code)
            - "--enable-auto-tool-choice"
            # Dedicated parser for Qwen3-Coder XML-style function calling
            - "--tool-call-parser=qwen3_coder"
          ports:
            - containerPort: 8000
          env:
            - name: HF_HOME
              value: /data
          resources:
            limits:
              nvidia.com/gpu: 1
            requests:
              cpu: "1"
              memory: 8Gi
          volumeMounts:
            - name: models
              mountPath: /data
            - name: shm
              mountPath: /dev/shm
          # Generous startup probe - model download can take a while
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 120
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: vllm-models
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: default
spec:
  selector:
    app: vllm
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vllm
  namespace: default
spec:
  ingressClassName: private
  rules:
    - host: vllm.hoam.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vllm
                port:
                  number: 80

