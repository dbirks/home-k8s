# =====================================================================
# vLLM Multi-Model Setup (single GPU, one model active at a time)
# =====================================================================
# Both deployments share the same Service/Ingress/PVC and the `app: vllm`
# label, so vllm.hoam.lan always routes to whichever model is running.
# Only one can hold the GPU — K8s keeps the other Pending if both are scaled up.
#
# Switch models:
#   kubectl scale deploy/vllm-qwen36 --replicas=0
#   kubectl scale deploy/vllm-gemma4 --replicas=1
#   (wait ~2-5 min for model load, or reverse to switch back)
#
# Claude Code / Agent SDK connection (unchanged regardless of model):
#   ANTHROPIC_BASE_URL=http://vllm.hoam.lan
#   ANTHROPIC_API_KEY=dummy
#   ANTHROPIC_AUTH_TOKEN=dummy
#   ANTHROPIC_DEFAULT_OPUS_MODEL=main
#   ANTHROPIC_DEFAULT_SONNET_MODEL=main
#   ANTHROPIC_DEFAULT_HAIKU_MODEL=main
#   DISABLE_PROMPT_CACHING=1
#
# Docs: https://docs.vllm.ai/en/latest/serving/integrations/claude_code/
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-models
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      # Shared model cache - holds multiple models across switches
      storage: 150Gi

# =====================================================================
# Model A: Qwen3.6-35B-A3B (AWQ 4-bit) — ACTIVE
# =====================================================================
# GatedDeltaNet hybrid MoE (35B total, 3B active per token)
# VRAM: ~24GB weights, ~6GB for KV cache
# Better agentic performance, thinking-before-tools mode
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen36
  namespace: default
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm
      model: qwen36
  template:
    metadata:
      labels:
        app: vllm
        model: qwen36
    spec:
      runtimeClassName: nvidia
      enableServiceLinks: false
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.19.1
          command:
            - vllm
            - serve
            - cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit
            - "--host=0.0.0.0"
            - "--port=8000"
            - "--served-model-name"
            - "main"
            - "qwen36"
            - "--max-model-len=262144"
            - "--dtype=bfloat16"
            - "--gpu-memory-utilization=0.95"
            - "--max-num-seqs=4"
            - "--kv-cache-dtype=fp8_e4m3"
            - "--enable-prefix-caching"
            - "--trust-remote-code"
            - "--language-model-only"
            - "--enable-auto-tool-choice"
            - "--tool-call-parser=qwen3_coder"
            - "--reasoning-parser=qwen3"
            - "--max-num-batched-tokens=2096"
          ports:
            - containerPort: 8000
          env:
            - name: HF_HOME
              value: /data
          resources:
            limits:
              nvidia.com/gpu: 1
            requests:
              cpu: "1"
              memory: 8Gi
          volumeMounts:
            - name: models
              mountPath: /data
            - name: shm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 120
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: vllm-models
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi

# =====================================================================
# Model B: Gemma 4 26B-A4B (AWQ 4-bit) — INACTIVE
# =====================================================================
# Standard transformer MoE (26B total, ~4B active per token)
# VRAM: ~15GB weights, ~15GB for KV cache
# Apache 2.0, multimodal (vision+text), dedicated gemma4 tool parser
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-gemma4
  namespace: default
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm
      model: gemma4
  template:
    metadata:
      labels:
        app: vllm
        model: gemma4
    spec:
      runtimeClassName: nvidia
      enableServiceLinks: false
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.19.1
          command:
            - vllm
            - serve
            - cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit
            - "--host=0.0.0.0"
            - "--port=8000"
            - "--served-model-name"
            - "main"
            - "gemma4"
            - "--max-model-len=131072"
            - "--dtype=bfloat16"
            - "--gpu-memory-utilization=0.95"
            - "--max-num-seqs=8"
            - "--kv-cache-dtype=fp8_e4m3"
            - "--enable-prefix-caching"
            - "--trust-remote-code"
            - "--enable-auto-tool-choice"
            - "--tool-call-parser=gemma4"
          ports:
            - containerPort: 8000
          env:
            - name: HF_HOME
              value: /data
          resources:
            limits:
              nvidia.com/gpu: 1
            requests:
              cpu: "1"
              memory: 8Gi
          volumeMounts:
            - name: models
              mountPath: /data
            - name: shm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 120
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: vllm-models
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi

# =====================================================================
# Shared Service & Ingress — routes to whichever model pod is running
# =====================================================================
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: default
spec:
  selector:
    app: vllm
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vllm
  namespace: default
spec:
  ingressClassName: private
  rules:
    - host: vllm.hoam.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vllm
                port:
                  number: 80

# =====================================================================
# FALLBACK: Qwen3-Coder-30B-A3B-Instruct (AWQ 4-bit)
# =====================================================================
# Standard transformer MoE, proven stable. ~15GB weights leaves plenty
# of KV cache. To add as a third deployment, copy the Qwen3.6 block and:
#   - cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit
#   + stelterlab/Qwen3-Coder-30B-A3B-Instruct-AWQ
#   Change name to vllm-qwen3coder, model label to qwen3coder
#   Change --served-model-name to "main" "qwen3-coder"
#   Change --max-num-seqs to 8
#   Remove --language-model-only, --reasoning-parser, --max-num-batched-tokens
