apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vllm
  namespace: default
spec:
  interval: 5m
  timeout: 15m
  chart:
    spec:
      chart: vllm-stack
      version: 0.1.10
      sourceRef:
        kind: HelmRepository
        name: vllm
        namespace: flux-system
      interval: 5m
  values:
    servingEngineSpec:
      runtimeClassName: nvidia
      modelSpec:
        - name: qwen3-8b
          repository: vllm/vllm-openai
          tag: latest
          modelURL: Qwen/Qwen3-8B
          replicaCount: 1
          requestCPU: 2
          requestMemory: 16Gi
          requestGPU: 1
          pvcStorage: 50Gi
          storageClass: local-path
          shmSize: 8Gi
          vllmConfig:
            maxModelLen: 8192
            dtype: bfloat16
            gpuMemoryUtilization: 0.90

    routerSpec:
      enableRouter: true
      replicaCount: 1
      ingress:
        enabled: true
        className: private
        hosts:
          - host: vllm.hoam.lan
            paths:
              - path: /
                pathType: Prefix

    kube-prometheus-stack:
      enabled: false

    prometheus-adapter:
      enabled: false
