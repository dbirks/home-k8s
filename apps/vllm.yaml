# vLLM Deployment - Qwen3.6-27B + Granite Speech sidecar
#
# Main model: unsloth/Qwen3.6-27B-NVFP4 (coding LLM)
#   - Hybrid DeltaNet+Attention architecture, 27B dense, NVFP4 quantization
#   - 77.2% SWE-bench Verified (base model)
#   - Served as "main" and "qwen27" on port 8000
#
# Native sidecar: ibm-granite/granite-speech-4.1-2b (speech-to-text)
#   - 2B params, ~4GB VRAM
#   - OpenAI-compatible /v1/audio/transcriptions endpoint
#   - Served as "granite-speech" on port 8001
#   - Starts FIRST via K8s native sidecar (initContainer + restartPolicy: Always)
#   - Must pass startupProbe before main model begins loading
#
# Claude Code connection:
#   ANTHROPIC_BASE_URL=http://vllm.hoam.lan
#   ANTHROPIC_API_KEY=dummy
#   ANTHROPIC_AUTH_TOKEN=dummy
#   ANTHROPIC_DEFAULT_OPUS_MODEL=main
#   ANTHROPIC_DEFAULT_SONNET_MODEL=main
#   ANTHROPIC_DEFAULT_HAIKU_MODEL=main
#   claude
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-models
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 150Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen27
  namespace: default
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm
      model: qwen27
  template:
    metadata:
      labels:
        app: vllm
        model: qwen27
    spec:
      runtimeClassName: nvidia
      enableServiceLinks: false
      initContainers:
        - name: granite-speech
          restartPolicy: Always
          image: vllm/vllm-openai:v0.20.1
          command:
            - vllm
            - serve
            - ibm-granite/granite-speech-4.1-2b
            - "--host=0.0.0.0"
            - "--port=8001"
            - "--served-model-name=granite-speech"
            - "--max-model-len=2048"
            - "--dtype=bfloat16"
            - "--gpu-memory-utilization=0.20"
            - "--enforce-eager"
            - "--skip-mm-profiling"
            - "--trust-remote-code"
          ports:
            - containerPort: 8001
          env:
            - name: HF_HOME
              value: /data
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
          volumeMounts:
            - name: models
              mountPath: /data
            - name: shm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 40
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 30
            failureThreshold: 5
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.20.1
          command:
            - vllm
            - serve
            - unsloth/Qwen3.6-27B-NVFP4
            - "--host=0.0.0.0"
            - "--port=8000"
            - "--served-model-name"
            - main
            - qwen27
            - "--max-model-len=196608"
            - "--dtype=bfloat16"
            - "--gpu-memory-utilization=0.80"
            - "--max-num-seqs=12"
            - "--kv-cache-dtype=fp8_e4m3"
            - "--enable-prefix-caching"
            - "--trust-remote-code"
            - "--enable-auto-tool-choice"
            - "--tool-call-parser=qwen3_coder"
            - "--reasoning-parser=qwen3"
            - "--performance-mode=throughput"
            - "--max-num-batched-tokens=8192"
          ports:
            - containerPort: 8000
          env:
            - name: HF_HOME
              value: /data
            # Authenticated HF downloads (faster, no rate limits)
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
          resources:
            limits:
              nvidia.com/gpu: 1
            requests:
              cpu: "1"
              memory: 8Gi
          volumeMounts:
            - name: models
              mountPath: /data
            - name: shm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 120
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: vllm-models
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: default
spec:
  selector:
    app: vllm
    model: qwen27
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: granite-speech
  namespace: default
spec:
  selector:
    app: vllm
    model: qwen27
  ports:
    - port: 80
      targetPort: 8001
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vllm
  namespace: default
spec:
  ingressClassName: private
  rules:
    - host: vllm.hoam.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vllm
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: granite-speech
  namespace: default
spec:
  ingressClassName: private
  rules:
    - host: speech.hoam.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: granite-speech
                port:
                  number: 80
