apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vllm
  namespace: default
spec:
  interval: 5m
  timeout: 15m
  chart:
    spec:
      chart: vllm-stack
      version: 0.1.10
      sourceRef:
        kind: HelmRepository
        name: vllm
        namespace: flux-system
      interval: 5m
  values:
    servingEngineSpec:
      # Use the nvidia RuntimeClass so pods get GPU access
      runtimeClassName: nvidia

      # Startup probe - very generous for slow cold starts on i5-6600K
      # Triton kernel compilation for Mamba/DeltaNet layers takes 10-20+ min on first run
      startupProbe:
        initialDelaySeconds: 30
        periodSeconds: 30
        failureThreshold: 120
        httpGet:
          path: /health
          port: 8000

      # Liveness probe - once running, check every 30s
      livenessProbe:
        initialDelaySeconds: 30
        periodSeconds: 30
        failureThreshold: 5
        httpGet:
          path: /health
          port: 8000

      # =====================================================================
      # ACTIVE MODEL: Qwen3.5-35B-A3B (GPTQ-Int4)
      # =====================================================================
      # Best for: broad reasoning, agentic workflows, long context
      # Architecture: Hybrid MoE (35B total, 3B active per token)
      #   - 3 of 4 layers use Gated DeltaNet (Mamba-style linear attention)
      #   - 1 of 4 layers use standard grouped-query attention
      # Thinking mode: built-in <think> reasoning, togglable per-request
      # Expected speed on 5090: ~194-202 tok/s generation
      # VRAM: ~22GB weights + KV cache, fits 131K context with FP8 KV
      #
      # TO SWITCH MODELS: replace this modelSpec entry with one of the
      # alternatives below (commented out), then commit and push.
      #
      # Sampling presets (set client-side):
      #   Thinking mode (reasoning/agents): temp=1.0, top_p=0.95, top_k=20, presence_penalty=1.5
      #   Thinking mode (precise coding):   temp=0.6, top_p=0.95, top_k=20, presence_penalty=0.0
      #   Non-thinking (general chat):      temp=0.7, top_p=0.8,  top_k=20, presence_penalty=1.5
      #   Toggle thinking per-request: extra_body={"chat_template_kwargs": {"enable_thinking": true/false}}
      modelSpec:
        - name: qwen35-35b
          repository: vllm/vllm-openai
          tag: latest
          # HuggingFace model ID - vLLM downloads from huggingface.co on first start
          modelURL: Qwen/Qwen3.5-35B-A3B-GPTQ-Int4
          replicaCount: 1
          requestCPU: 1
          requestMemory: 8Gi
          requestGPU: 1
          limitCPU: 2
          limitMemory: 32Gi
          # Model weights (~22GB) + HuggingFace cache for multiple models
          pvcStorage: 150Gi
          storageClass: local-path
          # Shared memory for PyTorch IPC
          shmSize: 8Gi
          vllmConfig:
            # MANDATORY: float16 crashes with GPTQ-Int4 due to mixed weight dtypes
            dtype: bfloat16
            # 32K is stable on 32GB with GPTQ + FP8 KV cache.
            # 65K OOM'd on KV cache init - can retry once Triton cache is warm.
            maxModelLen: 32768
            # 0.90 works once model is cached on disk. First-ever cold start
            # may need 0.85 due to Triton autotuner eating 4-8GB temporarily.
            gpuMemoryUtilization: 0.90
            # Limit concurrent sequences - 2 is safe on 32GB with this model
            maxNumSeqs: 2
            # MANDATORY: Mamba/DeltaNet layers need block_size <= max_num_batched_tokens
            maxNumBatchedTokens: 2096
            extraArgs:
              - "--kv-cache-dtype=fp8"           # Halves KV cache, essential for long context
              - "--enable-prefix-caching"         # Reuses KV cache for repeated prefixes
              - "--reasoning-parser=qwen3"        # Parses <think>...</think> in API responses
              - "--trust-remote-code"             # Required for Qwen model code
              - "--quantization=gptq_marlin"      # Fast Marlin kernel for GPTQ
              - "--enforce-eager"                 # Disable CUDA graphs (MoE+Mamba can break them)

      # =====================================================================
      # ALTERNATIVE MODEL: Qwen3-Coder-30B-A3B-Instruct (AWQ 4-bit)
      # =====================================================================
      # Best for: coding, tool calling, agentic coding tasks
      # Architecture: MoE (30B total, 3B active per token)
      # VRAM: ~15GB weights, leaves ~14GB for KV cache
      # Practical context: 32-65K tokens
      #
      # To activate: replace the modelSpec above with this block:
      #
      # modelSpec:
      #   - name: qwen3-coder-30b
      #     repository: vllm/vllm-openai
      #     tag: latest
      #     modelURL: Qwen/Qwen3-Coder-30B-A3B-Instruct-AWQ
      #     replicaCount: 1
      #     requestCPU: 1
      #     requestMemory: 8Gi
      #     requestGPU: 1
      #     limitCPU: 2
      #     limitMemory: 32Gi
      #     pvcStorage: 150Gi
      #     storageClass: local-path
      #     shmSize: 8Gi
      #     vllmConfig:
      #       dtype: bfloat16
      #       maxModelLen: 32768
      #       gpuMemoryUtilization: 0.95
      #       maxNumSeqs: 4
      #       extraArgs:
      #         - "--quantization=awq_marlin"
      #         - "--enable-prefix-caching"
      #         - "--enable-auto-tool-choice"
      #         - "--tool-call-parser=hermes"     # Qwen3 uses Hermes-style tool calls
      #         - "--trust-remote-code"
      #         - "--enforce-eager"

      # =====================================================================
      # ALTERNATIVE MODEL: Gemma 4 26B-A4B (AWQ 4-bit)
      # =====================================================================
      # Best for: multimodal (vision+text), fast inference, general reasoning
      # Architecture: MoE (25.2B total, 3.8B active, 8/128 experts)
      # License: Apache 2.0 (fully open, commercial OK)
      # Supports: text, image, video input
      # VRAM: ~16-18GB at 4-bit, very comfortable on 32GB
      #
      # To activate: replace the modelSpec above with this block:
      #
      # modelSpec:
      #   - name: gemma4-26b
      #     repository: vllm/vllm-openai
      #     tag: latest
      #     modelURL: cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit
      #     replicaCount: 1
      #     requestCPU: 1
      #     requestMemory: 8Gi
      #     requestGPU: 1
      #     limitCPU: 2
      #     limitMemory: 32Gi
      #     pvcStorage: 150Gi
      #     storageClass: local-path
      #     shmSize: 8Gi
      #     vllmConfig:
      #       dtype: bfloat16
      #       maxModelLen: 65536
      #       gpuMemoryUtilization: 0.90
      #       maxNumSeqs: 4
      #       extraArgs:
      #         - "--enable-prefix-caching"
      #         - "--trust-remote-code"

    routerSpec:
      # Router disabled - unnecessary for single model on single GPU,
      # and the lmstack-router image was crash-looping.
      # Access the model directly via the engine service + ingress below.
      enableRouter: false

    # Monitoring - disabled for home use
    kube-prometheus-stack:
      enabled: false
    prometheus-adapter:
      enabled: false
---
# Ingress for the vLLM model service directly (router is disabled)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vllm
  namespace: default
spec:
  ingressClassName: private
  rules:
    - host: vllm.hoam.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vllm-qwen35-35b-engine-service
                port:
                  number: 80
